body:
  text: 易翼傳上經下宋鄭汝諧撰大有乾下離上大有元亨翼傳曰陽為大隂為小以一隂居尊而為五陽所歸其所有者大也大非隂柔所能有也必沖虚不自滿者能有之此心一滿則喪其所有矣六五明體而虚中所以為大有所以為元亨若直以大有為富有盛大則失其義矣彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨從程氏象曰火在天上大有君子以遏惡揚善順天休命翼傳曰以隂柔而有衆陽天之所命也苟混焉无所旌别則有非其有矣安能順天命乎餘從程氏初九无交害匪咎艱則无咎象曰大有初九无交害也翼傳曰當盛有之時羣陽為五之所有惟初獨立而无交是害也然其位處卑也其有未盛也雖曰无交人以為非咎也故曰匪咎知人之不我咎艱難兢畏而不敢自肆又可以免咎也故曰艱則无咎二咎異意不可不察九二大車以載有攸往无咎象曰大車以載積中不敗也從程氏九三公用亨於天子小人弗克象曰公用亨于天子小人害也翼傳曰二應於五而四比之皆五之所固有者三於五无相得之義未能通於五也富有而未通於其君則失之專故三當自通於天子亨通也已有剛健之才上有離明之主三可以自通矣若小人處之必以其剛健富盛而自私安能通哉餘從程氏九四匪其彭无咎象曰匪其彭无咎明辨晳也翼傳曰詩言駟騵彭彭行人彭彭謂其駢累而至者盛多也四居四陽之首而率諸陽與之偕進其盛多蓋彭彭然明不能燭理智不能慮逺以其盛多者而震之必非柔中之君所能安也下三陽皆健體四乃明之始也有明辨之智則匪其彭然後能免於咎六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也翼傳曰六五之所有者孚而曰威如者徳威惟畏也以柔順而有羣陽區區焉設關鍵以為備則亦不勝其備矣五居尊虚中而以其坦易者待之我以孚感彼以孚應无備而上下從不嚴而人知畏此所以為大有也法制密而誠意消是豈大有之君哉上九自天祐之吉无不利象曰大有上吉自天祐也翼傳曰履信思乎順又以尚賢也蓋言五也五厥孚交如履信也居尊用柔思順也上九在上尚賢也五獲自天之祐吉无不利者由其有是也言五而繫之上何也五成卦之主大有之君上其終也五之徳宜獲是福於終可驗也易之取義若是者衆小畜之上九曰婦貞厲月幾望言六四之畜陽至上而為正厲之婦幾望之月也若指上九而言則上九陽也不得為婦與月也說易者其失在於泥爻以求義故以履信思順又以尚賢歸之于上九也其說曰履六五之虚中履信也謙退不居思順也志從於五尚賢也剛極于上无謙退不居之義下從于五不可言尚易之所謂尚與上同也五之履信思順以有其下其有未備也惟尚上九之賢則其有備矣福者備也備者百順之名也故自天之祐於上九見之謙艮下坤上謙亨君子有終翼傳曰方謙之始自處于卑下而已未見其得也及要其終則尊者愈光卑者不可踰所謂君子有終也彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也從程氏象曰地中有山謙君子以裒多益寡稱物平施翼傳曰人之言曰謙者卑下而已卑下非謙也地中有山謂卑下而有崇高之義其用則多者裒歛之寡者増益之稱物平施使適其中是之謂君子之終初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也翼傳曰三謙之主也二下之而初又下之謙而又謙故曰謙謙才弱而位下若不足與有為也然世之能動者實生於至靜而能勇者實生於至柔惟靜可以養動惟柔可以養勇有所養則發不可禦初之謙謙可用渉大川由其卑以自牧也牧養也六二鳴謙貞吉象曰鳴謙貞吉中心得也翼傳曰鳴者氣有所感也易言鳴者三豫之初謙之二與上皆以隂求陽感之而至於鳴也三為謙之主二以中正而位其下以柔從剛以下從上所以感於三者誠矣故其鳴也為正且吉鳴而得遂其為謙之志故又曰中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也翼傳曰一隂為卦之主嘗辨之於履矣一陽為卦之主義亦甚明九三為衆隂之所歸蓋勞而有功者乃自止於不得衆之位是謂勞而不伐有功而不徳此卦之所以成謙而三所以為謙之主君子有終萬民之服惟三足以當之六四无不利撝謙象曰无不利撝謙不違則也六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也翼傳曰謙者禮也禮者理而已矣稱物平施之謂也故謙之下體皆曰吉而上體皆曰利吉者善之至也利者利如是爾未便吉也蓋下體艮艮止也謙而能止則不過上體坤坤順也謙而順從則无咎此作易者别以吉利而致意焉不獨爾也謙之主在三初與二蓋承乎三者夫人勞而有功而位乎上其下能謙以承之安得而不吉四五上六則位乎三之上矣三雖勞而有功在上者當遇之以禮不以禮而順從之非謙也故四曰无不利撝謙撝若指撝然不勞而施之之謂惟撝謙乃不違則也則中道也五以柔居尊无剛陽之實不富也為羣柔之主而與之相親以其鄰也居尊不富而又下无其應苟一於柔而无以濟之則尊者屈柔者弱矣古者之法負固則侵之有罪則伐之下有不率乎上毋謂吾事謙而不用侵伐也不用則謙徳隳矣故曰利用侵伐征不服也上與二皆曰鳴謙二比於三上其應也二之鳴得中故正吉上以順之極而應乎三三為止之主而不交乎上故上雖鳴而求之其志未得也如是而志未得亦勞且葸矣故利用行師以征邑國行師者用剛武也邑國者其私所有也以剛武自反而治其私則上之志可得矣是三爻致意之深惟熟味則得之豫坤下震上豫利建侯行師翼傳曰豫一字而兼數義曰和豫曰事豫則立豫之善也曰猶豫曰逸豫豫之不善也合卦而觀之其象則雷出地奮其義則豫順以動豫之至善也分爻而觀之有為豫之善有為豫之不善者其所處之得失係焉爾餘從程氏彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉從程氏象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考從程氏初六鳴豫凶象曰初六鳴豫志窮凶也翼傳曰四為豫之主初其應也以下恱上以隂恱陽求寵之切而至發於聲音其志必欲窮寵極欲而後已初之豫逸豫也故凶六二介于石不終日貞吉象曰不終日貞吉以中正也翼傳曰初應於四為窮凶三比之為有悔五亦比之為正疾惟六二得中得正自處於重隂之間而不昵於四其堅介蓋如石也介于石何以能知幾也惟至晦者故能明惟至靜者故能勇二以靜晦自守而不蔽於欲其於天下之理皆昭然於吾前不動則已動則不俟終日而不失其幾二之豫先知之豫也故貞吉六三盱豫悔遲有悔象曰盱豫有悔位不當也翼傳曰盱睢盱也不自安之貎遲遲疑也不自决之貎四羣隂之所同應也三欲求昵於四故睢睢盱盱而上視四有其應而取之不專故三遲遲而不自决三所處之位不中不正其進退取舍少能裁之以義此猶豫之豫也故動則取悔九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也翼傳曰羣隂皆順從朋盍簪也於朋之盍簪而不以疑慮寘其間則不傷於和豫矣四豫之主專取和豫之義餘從程氏六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也翼傳曰二與五皆不言豫二靜晦不為豫也五乘剛不敢豫也四方得位為衆所歸五之欲有所制而不得逞偲偲然視四之制已若貞固之疾人有得一固疾疾雖不快於己亦足以乆其生者有戒心也四以和豫得衆而无害五之心五得四而有所戒是以五未亡而常存也中位也言五所居之位得中而未亡也上六冥豫成有渝无咎象曰冥豫在上何可長也翼傳曰上亦不累於四也所以異於二者二中正而有守上則動而極乎外冥冥然无所睹而豫也雖然逸豫之人懼其有所陷溺也陷溺則逐欲而忘反上之冥豫雖成庶幾其或變也何也冥而无所陷溺也无所陷溺必非長乆於豫者是以有必變之義曰何可長也告之以速變也隨震下兌上隨元亨利貞无咎從程氏􅂏曰隨剛来而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉從程氏象曰澤中有雷隨君子以嚮晦入宴息從程氏初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也從程氏六二係小子失丈夫象曰係小子弗兼與也翼傳曰二中且正乃係小子而失丈夫三不中正乃係丈夫而失小子蓋隨之為卦動而說以陽下隂以少女從長男兼此數義是以易動於欲其守正而不動非剛陽者不能也二與三皆隂柔之質隂柔者以欲而隨人比近則必合二比初之陽初在下小子也三比四之陽四在上丈夫也二爻非一定之辭乃設辭以為之戒也餘從程氏六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也從程氏九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也從程氏九五孚于嘉吉象曰孚于嘉吉位正中也翼傳曰昏禮曰嘉嘉耦曰妃易之嘉皆配也以下闕蠱巽下艮上蠱元亨利渉大川先甲三日後甲三日從程氏彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也翼傳曰器以日用則不蠧人以日勞則无疾蠱以剛居上上无所事之地也柔來居初初在内而下也凡物之蠧必自内與下始剛上而柔下内與下蠱壞也其義則下順而上止下順而无所違上止而无所事因循苟且亦所以成蠱蠱非事也於蠱壞之時而從事焉故蠱為有事之象爻皆取子道言之明非創始之事乃飭壞之事也雖然既為蠱矣未嘗存蠱壞之義何也萬物未有廢而不起亂而不治者使終於廢且亂是則理息矣故曰終則有始天行也甲有六終始之義先三日後三日究其始終而慮之也象曰山下有風蠱君子以振民育徳翼傳曰振民者作之使不媮也育徳者養之使不窮也不媮不窮所以治蠱凡蠱生於媮且窮也初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也翼傳曰柔來變剛蠱壞之始也幹蠱當於其始必有幹之之子則其父可以无咎子改父道始雖厲而終則吉蓋其事若不順而其意則承其父也九二幹母之蠱不可貞象曰幹母之蠱得中道也從程氏九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也從程氏六四裕父之蠱往見吝象曰裕父之蠱往未得也翼傳曰既蠱矣宜幹不冝裕也四切近於五以柔居隂惟能應之以和裕非能除害而興壞故往見吝而志未得也六五幹父之蠱用譽象曰幹父用譽承以徳也翼傳曰幹蠱壞之事非有才者不能六五才雖不足而居中用柔柔中之徳亦可獲譽承以徳譽可以守成而已故不言吉凶也上九不事王侯髙尚其事象曰不事王侯志可則也翼傳曰事之始猶未定也君子則出力以幹之事之終也成者不必有為壞者不可復為君子无所用其力矣是以上九雖有其才處於事之外不事事而高尚其事也槩之聖人雖非中道而其高㓗不屑之志亦可法則矣武王旣興周光武既興漢夷齊嚴光不事王侯君子未有非之者有可則之志也不言吉凶作易之意可見矣餘從程氏臨兌下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不乆也翼傳曰卦以臨名未有釋之者序卦曰臨者大也二陽浸長不可謂大詳觀彖爻初无大義古今訓解亦未見以臨為大者余疑序卦非作於聖人此其一端也然則臨之義安在哉書曰臨下以簡語曰以臨其民臨者上臨其下也二陽在下四隂在上言二陽為四隂之所臨覆去音也倒而觀之則為觀觀者下觀上也二陽在上四隂在下言二陽為四隂之所觀仰也二卦相對其義甚明陽為隂所臨覆不見其為咎悔何也上順體也下說體也陽以說而進不廹乎隂隂以順而受不拒乎陽故陽與隂相感也隂陽相感可以致大亨是以初二兩爻皆曰咸臨咸者感也惟其相得是以相感利貞者戒之也至于八月有凶慮其狎乎隂而豫為之戒也臨位乎丑自臨至申凡歴八月三隂生而為否矣易著隂之為害无若否與剥也象曰澤上有地臨君子以教思无窮容保民无疆翼傳曰此取上臨下之義无取於隂之臨陽也餘從程氏初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉无不利象曰咸臨吉无不利未順命也翼傳曰咸感也感之而進故進而隂不忌斯能行其志矣然二陽雖說體皆剛陽之才也剛陽豈以兊說而感人哉故初曰志行正也二曰未順命也能行已之正能不順上之命則感之以其道矣初曰貞吉猶有戒意至二則直曰吉无不利初未得中而二居中也程子以未字古用之與不字同六三甘臨无攸利旣憂之无咎象曰甘臨位不當也旣憂之咎不長也翼傳曰為兊之主而其質隂柔所居非正徒以甘說以臨二陽故无所利然二陽方亨三獨乘之冝其不安而憂也旣憂之則无咎者同體而說不近乎陽故雖有咎而不長也六四至臨无咎象曰至臨无咎位當也翼傳曰其位在上下之際臨之切至也凡上之臨下惟患其逺之不相通四既近於下而初實感之其所處之位至當是以无咎六五知臨大君之宜吉象曰大君之宜行中之謂也翼傳曰五臨之主也陽進未盛而隂受乎陽君子小人之辨其責在五五隂柔之君也明不足以察慮不足以周下應二陽則惑矣必以知臨乃大君所冝又曰行中之謂也中五之所有也惟中者為能用知不由乎中過者失之察不及者失之蔽必不能善處君子小人之際五所宜者知也能行吾中斯謂之知矣上六敦臨吉无咎象曰敦臨之吉志在内也翼傳曰復之五逺於初陽若不能復也而曰敦復臨之上逺於二陽若无所臨也而曰敦臨敦厚也坤之徳也惟體坤徳者為能順賢而從善故於二陽雖非其應而其志則在焉餘從程氏觀坤下巽上觀盥而不薦有孚顒若翼傳曰四隂已盛不取隂廹陽之義蓋二陽在上四隂在下下順也上巽也下以順而觀仰乎陽上以巽而為觀乎隂隂陽巽順以相與故无廹陽之義餘從程氏􅂏曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣從程氏象曰風行地上觀先王以省方觀民設教從程氏初六童觀小人无咎君子吝象曰初六童觀小人道也從程氏六二闚觀利女貞象曰闚觀女貞亦可醜也從程氏六三觀我生進退象曰觀我生進退未失道也翼傳曰三雖下體漸近於上異於初與二也然處上下之交其進退不可輕也反而觀諸已可進則進可退則退則亦不失其道矣不言吉凶悔吝其得失視其進退也或曰二中正而可醜三不中正而不失道何也觀之時隂觀陽也下四爻皆隂不必言其當位不當位惟以觀之逺近為得失爾六四觀國之光利用賔于王象曰觀國之光尚賔也從程氏九五觀我生君子无咎象曰觀我生觀民也從程氏上九觀其生君子无咎象曰觀其生志未平也翼傳曰五觀我生自觀也上觀其生觀五也上與五同為下之所觀五得位而上不得其位故上觀五之所為未嘗釋於心故曰志未平也所以不釋於心者以與五同受其下之責五之得失上之所同也說者謂上為師傅之位觀此亦可見餘從程氏噬嗑震下離上噬嗑亨利用獄從程氏彖曰頥有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也翼傳曰余嘗論成卦之名取義不一不必泥大象而為鑿說今觀此卦尤可見也彖曰頥中有物曰噬嗑大象則曰雷電噬嗑使聖人不言之於彖則釋經者必牽合雷電而為噬嗑之說矣得意而忘象斯可以觀易餘從程氏象曰雷電噬嗑先王以明罰勑法翼傳曰雷電相合而章先王法其威照之象而明罰勅法於噬嗑之義无取也初九屨校滅趾无咎象曰屨校滅趾不行也從程氏六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也從程氏六三噬腊肉遇毒小吝无咎象曰遇毒位不當也從程氏九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也從程氏六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也從程氏上九何校滅耳凶象曰何校滅耳聰不明也翼傳曰噬嗑除間也觀爻辭之得失大抵有二義去間必於其㣲刑人欲當其位不於其微則為間日深不當其位則刑人不服初上取始終之義以為戒初乃動體於其動之始而能制之故不行也上雖明體積而過至於怙終故聦不明也中四爻用刑者也二應於五而四比之皆得乎君而用刑者故无咎惟三則遇毒者不當位也不當位有二義不得乎五也處不中正也雖吝无咎者噬人非噬於人者也刑者不得已而用也以除間而用刑用所當用也諸爻皆具艱難之辭者蓋知其不得已也殛鯀放驩兠雖舜亦病而難之此噬嗑雖亨而吉辭甚寡也賁離下艮上賁亨小利有攸往從程氏彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往翼傳曰剛柔相文而為賁賁餙也凡致餙之道能文其質不能加乎其質柔來而文剛以剛為質質勝於文也故亨分剛上而文柔以柔為質文勝於質也故小利有攸往三代之忠質文雖各有失而夫子之欲從者則先進之禮樂也天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下從程氏象曰山下有火賁君子以明庶政无敢折獄從程氏初九賁其趾舍車而徒象曰舍車而徒義弗乘也從程氏六二賁其須象曰賁其須與上興也翼傳曰二以一柔而處二剛之間二剛皆頼其賁然隂柔而貳其所賁則非義矣故二當賁其須須與上興謂賁三也柔之文剛不能加乎其質故以須取義其不賁初而賁三何也初已應四二不必賁之矣三則上无其應二所當賁也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也翼傳曰一隂不可以賁二陽一陽則可受二隂之賁三處二隂之間二隂交賁之故濡如濡潤澤也然受二隂之賁惟久於貞則吉否則為二隂之所陵乘矣隂之交賁易以陵乘乎陽故告之六四賁如皤如白馬翰如匪宼㛰媾象曰六四當位疑也匪宼㛰媾終无尤也從程氏六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也上九白賁无咎象曰白賁无咎上得志也翼傳曰五比四而應二以柔遇柔无所賁也剛陽在上可以為賁故五當賁于丘園丘園在外而近指上九而言也束帛戔戔盛其禮以賁之然後得九之賁已如髙祖之賁四皓光武之賁嚴光是也在内无所賁而資賁於在外之賢固吝矣終必吉者人君禮賢之事也禮賢而賢不就何傷於人君之盛徳上九髙㓗處外不與物賁故曰白賁无咎使四皓而受髙祖之爵嚴光而受光武之聘與蕭曹宼鄧等耳何以遂其髙尚之節哉故上之白賁得志也剥坤下艮上剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也從程氏象曰山附於地剥上以厚下安宅從程氏初六剥牀以足蔑貞凶象曰剥牀以足以滅下也從程氏六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也翼傳曰易為君子謀不為小人謀觀否剥遯夬諸卦尤可見當小人之剥君子君子不顧而有為者取禍之道故曰不利有攸往知其不可往而委之於意外者亦非已亂之道故曰順而止之觀象也坤順而艮止卦有此象象者理也觀其理之可為則順其理而止之其消息盈虚皆所以奉天也漢室黨錮之禍激之而愈奔抑之而愈抗陳蕃李固之徒知有攸往不知順而止之之理也初剥以足二剥以辨皆剥之㣲也於剥之㣲尚有望於君子之正苟无君子之正則凶矣故初曰以滅下也滅下則其上猶可為也二曰未有與也二與五俱隂位雖應而情不應二雖得位而未有與未有與則小人尚可止也知其尚可止故特發此意以示之六三剥之无咎象曰剥之无咎失上下也從程氏六四剥牀以膚凶象曰剥牀以膚切近災也從程氏六五貫魚以宫人寵无不利象曰以宫人寵終无尤也翼傳曰五君位也不當例以小人之進為言故告以處小人之道彼小人之駢進如貫魚然其勢雖不可遏其志在於得寵利而已得所寵則安深拒之則競五思所以處之之道莫若以宫人寵之而不及以事則隂之為害亦淺可以須陽之復矣易之教人仁矣哉上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也從程氏復震下坤上復亨出入无疾朋來无咎反復其道七曰來復利有攸往從程氏彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也翼傳曰天之行如循環之无端曰反曰復言往而必來也曰七日言剥之與復元无間斷也有須臾間斷則乾坤之道息矣王弼曰復之不可逺也天道如是非不可逺乃不能逺也君子體天之道則以不可逺為貴餘從程氏復其見天地之心乎從程氏象曰雷在地中復先王以至日閉關商旅不行后不省方從程氏初九不逺復无祇悔元吉象曰不逺之復以修身也從程氏六二休復吉象曰休復之吉以下仁也從程氏六三頻復厲无咎象曰頻復之厲義无咎也從程氏六四中行獨復象曰中行獨復以從道也翼傳曰四雖行於羣隂之中而獨能從初其吉可知易有得失甚明而不言吉凶者不待言也象曰以從道也安有獨能從道而其義不吉者乎六五敦復无悔象曰敦復无悔中以自考也翼傳曰卦之主在初二比之曰休復四應之曰獨復三同體而逺曰頻復五最逺於初若不能復不能復宜有悔也曰敦復无悔者其體則坤其位則中以敦厚之體而居在中之位是謂黄裳之吉以是而復復在我者也故曰中以自考也考成也言在我者可以自成也不獨復也諸卦之六五未必皆善惟坤體則無不善此黄中之理惟知易者則識之上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也翼傳曰往而不知反者必喪其所歸迷而不知復者安得而不凶也去陽最逺極卦之終所謂迷復也迷則天之災人之眚行師君國无適而不凶也餘從程氏无妄震下乾上无妄元亨利貞其匪正有眚不利有攸往從程氏彖曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉翼傳曰无妄誠也不曰誠而曰无妄蓋動則渉於人心之危易以妄也聖人之動兆於復成於无妄方其未為復也其體純坤坤者闔也藏也退藏於宻之時也一變而復動之機已兆矣由復而順動一皆循於天理故為无妄者若曰其動皆天无一出於人欲也夫既无妄不可立一毫私意於其間故剛中而應大亨以正皆天理也有一非正莫非己過故曰有眚无妄則行其所當然有攸往乃私心也故曰天命不祐行矣哉命理也祐順也言天理之所不順也詩之稱文王無然畔援無然歆羡王赫斯怒以遏徂莒又曰不識不知順帝之則詢爾仇方以伐崇墉文王之心天也惟動以天雖至於興師動衆亦皆天也使文王於天理之外而有毫髪攸往之心是豈為文王也哉象曰天下雷行物與无妄先王以茂對時育萬物翼傳曰萬物雖異體莫不各具天理一物妄則无一物矣天下雷行物各自奮與非自外與之也物自相與為无妄也對時育物者亦因其可育而育之爾中庸謂至誠可以賛天地之化育至誠无妄也化育亦无妄也以无妄相與參賛故萬物亦无妄也知此理斯可以知天初九无妄往吉象曰无妄之往得志也翼傳曰卦言不利有攸往以全體言之无妄則大體皆正不宜更有所往也然所以成卦者謂其動以天也若天理冝動而不動又非无妄矣下三爻動體初乃動之主主乎動則天理所當動也故曰往吉若二與三皆動體之隂也二雖中正不冝妄動三動之極其妄甚焉六二不耕穫不菑畬則利有攸往象曰不耕穫未富也翼傳曰造始者陽因成者隂此理之至无妄者二以隂居隂且在下體上應於五當因成於五者也故不耕而穫不菑而畬則利有攸往不量其分之所宜而欲為耕且菑之事則妄矣故曰不耕穫未富也富實也富實言陽也二未若五之富實故以畬穫為无妄也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也翼傳曰无妄者理而已矣事有形於此而理之得失係於彼或者執其形而求之而不知所執者非理也夫不耕而穫不菑而畬冝畬穫者之妄也乃有不妄者存焉或者繫牛於此必責得於居人宜不妄也乃有大妄者存焉蓋眞妄在理而不在事也三非動之主而處動之極其質則隂而其居則陽所處不正見理不明徒知牛旣繫矣必邑人得之不知得之者有行人也卒之行人得牛而邑人乃災以其妄也呉謂勝齊晉可以圖霸而戕呉者不在齊晉乃在於越季孫謂顓臾近費而固以為子孫憂夫豈知季孫之憂乃在蕭牆之内也事之若此者衆舉一二則可以類推矣九四可貞无咎象曰可貞无咎固有之也翼傳曰五戒以勿藥上告以有眚蓋健體而應動易以妄也四雖健體其居則隂下无其應不累於動是乃可貞之道知其可貞而正守之則不失其所有矣故曰固有之也九五无妄之疾勿藥有喜象曰无妄之藥不可試也上九无妄行有眚无攸利象曰无妄之行窮之災也翼傳曰雜卦曰无妄災也天下之理求之太察責之太詳不全其天而悉力以為之者皆妄也妄則災之所由生也五剛而位乎中亦无妄矣然其才其位其時皆足以有為有為者易以求全也一物一事小有失其處者必一一以正焉夫求小者之皆正則於大正者或傷焉猶之无妄之疾不足藥也藥之則反傷元氣矣不知其傷元氣必欲以无一疾而為无妄者皆災也漢武帝當海内无事之時内則疾禮文之未備外則疾夷狄之未賔自謂我之雄才大略不可使有此疾更制立法興師動衆所以試吾藥也試之而疾益滋者以妄為无妄也上九以乾之極居卦之終窮其所行災自己致其類乎秦皇之妄歟大畜乾下艮上大畜利貞不家食吉利渉大川翼傳曰食音嗣所謂大畜養者謂養賢以及萬民若家食之則非大畜矣堯舜急親賢乃所以為徧愛故彖釋之曰養賢也餘從程氏彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也從程氏象曰天在山中大畜君子以多識前言往行以畜其徳翼傳曰畜有三義以畜養言之畜賢也以畜止言之畜健也以藴畜言之畜徳也養賢而推之以及萬民畜養之大者乾剛天下之至健四五能畜之畜止之大者剛健篤實輝光而其徳日新藴畜之大者三者所以為大畜也象曰天在山中大畜山非能畜天也託大小以見意意不在天山言以小畜大也方寸至㣲大包天地以形言之則有小大之别以理言之惟小為能畜大小能畜大所以為大之至也初九有厲利己象曰有厲利己不犯災也九二輿說輻象曰輿說輻中无尤也翼傳曰剛陽在下勢必上進然陽方受畜初乃陽之微者微而先進則危且災矣故以利已戒之二之輿說輻與小畜九三之說輻異也小畜之三進而厄於四其說輻不行不得已也九二剛而得中中則不過知其為受畜之時說輻而不敢進者順乎理也初與二皆受四五之畜四五雖至柔其體則艮也艮體而以至柔行之是以能畜天下之至剛昔之有智勇者惟椎鈍朴魯不自用其智勇者能畜之若以其智勇相角於勝負之中偶則為二參則為三未有受其畜者觀劉項之得失可見矣餘從程氏九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也翼傳曰天下之理交相制而已柔不制柔其制柔者剛也剛不制剛其制剛者柔也初與二受畜於四五柔制剛也若三與上則皆剛也皆剛則不相制而相合是以三之進若良馬之逐也餘從程氏六四童牛之牿元吉象曰六四元吉有喜也從程氏六五豶豕之牙吉象曰六五之吉有慶也翼傳曰以柔畜剛必畜之以其力則力不足以勝彼有不受其畜者故四五畜乾之道當若牛豕然牛雖有力而難畜於其童而加之以牿則不至觝觸矣豕雖剛躁而難制於始畜則先豶之雖有牙而不猛矣故今之畜豕者无不豶也柔之畜剛不可以力勝所以畜之者其理當如是四曰牛五曰豕牛有力尤難於畜豕四臣位五君位難易之别也四曰有喜五曰有慶慶者其喜之至歟餘從程氏上九何天之衢亨象曰何天之衢道大行也翼傳曰小畜之上曰旣雨旣處言陽受畜而止也大畜之上曰何天之衢亨言陽不受畜而通也先儒謂大畜畜極而散以二卦彖爻觀之非散也小畜之彖曰柔得位而上下應之曰小畜蓋小畜之六四獨為一卦之主非特下三陽受其畜而上二陽亦受其畜故曰上下應之謂畜之而止也大畜之彖曰剛上而尚賢能止健大正也蓋大畜四五二爻協力以畜在下之乾故曰能止健若上九與四五同體獨處于外旣不與四五同畜健亦不受四五之畜故曰剛上而尚賢謂之尚賢者言四五尊而上之故大畜之上不可畜而亨也亨則其道大行若天之衢无所不通豈與受畜者同哉下何字羡文餘從程氏頥震下艮上頥貞吉觀頥自求口實彖曰頥貞吉養正則吉也觀頥觀其所飬也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉象曰山下有雷頥君子以慎言語節飲食從程氏初九舍爾靈龜觀我朶頥凶象曰觀我朶頥亦不足貴也翼傳曰頥之上體皆吉而下體皆凶上體止也下體動也在上而止養人者也在下而動求養於人者也動而求養於人者必累於口體之養故雖以初之剛陽未免於動欲而觀朶頥也餘從程氏六二顚頥拂經于丘頥征凶象曰六二征凶行失類也從程氏六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也翼傳曰三應於上若得所養而凶莫甚於三蓋上之養下下之養於上皆貴於正三不中不正而居動之極所以求養於人者必无所不至上雖其應其體則艮之主艮止於上而不下交三極於動以求於上是謂拂於頥之貞凶之道也十數之終也十年勿用无攸利戒之也然則烏用戒為凡求養於人者其欲心未易消也因其有多欲妄動之心示之以自反之理作易之本意也六四顚頥吉虎視眈眈其欲逐逐无咎象曰顛頥之吉上施光也翼傳曰四隂柔不足而求養於初顛頥也居大臣之位而能求在下之賢以為養吉可知矣然上之養下養其欲也下之養上養其徳也四之顛頥蓋資初以養其徳彼有以養我之徳我可无以養其欲乎古之所謂賢者固未嘗志於爵禄也然上之人未有捨爵禄而能養賢者故初之視四如虎之視眈眈然四必養其欲使之逐逐而有繼然後无咎故曰顛頥之吉上施光也上之施不光則顛頥非吉矣初剛而動故為虎或以虎為四失之矣六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也從程氏上九由頥厲吉利渉大川象曰由頥厲吉大有慶也從程氏大過巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遯世无悶翼傳曰陽大隂小大過陽過也四陽居中而斥其隂於不用事之地故曰大過過者偏盛之辭陽君也隂臣也陽君子之道也隂小人之道也君欲其尊失之過則君驕亢而不有其臣矣君子欲其盛失之過則君子過常而不養小人矣大過陽過故至於本末之弱而其棟橈也今夫居室之中而强其室者棟也棟欲其隆而棟之所藉以為承乘者亦欲其不弱中四陽棟也其本末則皆隂也上承虚而无所庇下乘虚而无所據棟雖隆安得而不橈君子觀棟之橈利有攸往以拯之拯之則亨者以卦才言也其才則剛雖過而二五得中内巽而外說是足以抑其有餘之陽而濟不足之隂故有攸往而亨也其象為澤滅木澤所以養木也至於滅木則過矣君子知其旣過而不可復過也思其所以大過於人者惟獨立不懼遯世无悶而已當君之驕亢與夫君子之過常惟獨立而不溺乎人遯世而不徇乎世此其所以大過於人也說者乃謂大過諸爻能過越常分則吉不能為過常之事則凶消息盈虚損過補不足天之道易之義也大有則以富有為戒大壯則以陽壯為戒大過豈復以過常越分為吉乎理未有可過者旣過而復使之過无是理也大過之時大矣哉當其時拯其過貴於時措之宜也故贊之初六藉用白茅无咎象曰藉用白茅柔在下也翼傳曰陽過之時非隂柔之所能過也初能以巽順處下上承四陽如茅之藉物過於謹畏如此善用大過者也故曰夫茅之為物薄而用可重也苟措諸地可矣藉之用茅何咎之有慎斯術也以往其无所失矣九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也翼傳曰陽過則偏偏則亢是以大過之陽比隂則合二之陽方過下比初六之隂老夫而得女妻也夫老而妻少尚能成生育之功如楊之枯可以生稊稊者顛而復蘖反其始也若五則異矣五之陽既過乃比上六之隂士夫而得老婦也夫壯而妻老无復能生育矣如楊之枯僅能生華華者發而將散美其外也反其始者其過尚可救而美其外者君子以為无補於其過矣故二曰无不利五曰亦可醜也二之陽未老視初之少隂則老矣故曰老夫五之陽已老視上之老隂則壮矣故曰士夫以老而配少故曰過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也翼傳曰三四以陽居中棟之象也三則棟橈凶四則棟隆吉何也救過於其末者不若救之於其本以一身言之元氣本也四支末也以天下言之朝廷本也四方末也大過之棟橈由本末弱本末不可俱弱然實以本為重三所居不得位而應乎上救其末也救其末於己過之後故棟橈而不可有輔也四居大臣之位而應乎初救其本也救其本於未過之初故棟隆而不橈乎下也其下不橈其上烏得而不隆必戒以有它吝者救其本者不可不一其心也漢之季世搢紳之禍已成國家之勢已幾於不支矣李固陳仲舉之徒乃欲援之於末流紛紛之中噫亦晚矣使當未大過之時有大君子反而歸之於正禍豈如是之酷哉九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可乆也老婦士夫亦可醜也翼傳曰剛而得中故无咎不能救過故无譽上六過渉滅頂凶无咎象曰過渉之凶不可咎也翼傳曰下履四陽陽方盛而隂不可安其處是以過渉而至於滅頂也滅頂則凶矣作易者以為隂之滅頂陽實廹之隂雖罹其凶其義則不可咎也巽以柔居下故初之隂為茅兊為澤居上故上之隂為渉習坎坎下坎上習坎有孚維心亨行有尚從程氏彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉翼傳曰服習温習皆有重義八卦皆重獨坎加習文王之所加也繫辭曰作易者其有憂患乎文王居憂患之時而以憂患後世為心於是演易八卦自坎之外其七卦皆處平夷坦易之地惟坎則一陽䧟乎中而有險難之義其象為水水至險水雖至險而習乎水者雖出入乎水而不能溺然則習乎險難者斯能无入而不自得也舜禹湯文皆未免於險難惟其習於此是以能安於此加坎以習聖人憂患之心與仁天下後世之心可想而見矣象曰水洊至習坎君子以常徳行習教事從程氏初六習坎入于坎􅀢凶象曰習坎入坎失道凶也從程氏九二坎有險求小得象曰求小得未出中也翼傳曰二五雖居相應之地而皆陷於險以二之才所求小有得欲求五而相濟於險則未能出中也六三來之坎坎險且枕入于坎􅀢勿用象曰來之坎坎終无功也從程氏六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也從程氏九五坎不盈祇既平无咎象曰坎不盈中未大也翼傳曰二陷而在下五陷而在上在下者其陷為深故曰有險在上者亦未出於陷故曰不盈祇抵也若抵於既平則可无咎以其中之未大而有所陷也上六係用徽纆寘于叢棘三歲不得凶象曰上六失道凶三嵗也翼傳曰險之極宜變也然以隂柔而乘五之剛剛方陷於險故五係上以徽纆而寘之於叢棘也凡人之情安泰則相忘險難則相係隂非獨欲係陽陽亦欲係隂也五之係上是以至於三嵗不得捨也易言三歳十年皆數之變三近而十逺辭有輕重也或者以卦之數而推之皆牽合之說離離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也從程氏象曰明兩作離大人以繼明照于四方從程氏初九履錯然敬之无咎象曰履錯之敬以辟咎也翼傳曰初火雖㣲勢欲上行故所履錯然上遇六二以剛逼之二麗乎中正而得位其可逼哉必敬之斯可以免咎以其㣲也是以有可戒之義餘從程氏六二黄離元吉象曰黄離元吉得中道也從程氏九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也翼傳曰過中則昃昃則滅亡近之鼓缶而歌者惜衰暮而樂也若不樂則嗟大耋之及而復哀矣哀樂不相襲而至也今不樂則哀者以其過乎中是以秉心无常也餘從程氏九四突如其來如焚如死如棄如象曰突如其來如无所容也翼傳曰五以柔居上四逼之之遽故突如其來且焚如也焚而不戢将自焚矣故有死如棄如之禍餘從程氏六五出涕沱若戚嗟若吉象曰六五之吉離王公也翼傳曰成卦在二五皆以柔麗剛也二之辭安五之辭危二臣道也臣以柔而麗乎下正且吉也五君道也君以柔而麗於二剛之間安得而不危知危則吉者黄離之中且麗於王公之位也上九王用出征有嘉析首獲匪其醜无咎象曰王用出征以正邦也翼傳曰上九非王也言王於此爻當用征之之道也凡物皆相附麗而比於君者尤當麗於君也上九以炎上之火而極其炎于外其勢上趨而不下附于五五其可坐視其不附而不征之乎征之則嘉矣所謂嘉者非瀆吾威也折其渠魁獲非其類而已故曰征之為言正也舜之伐苖文王之伐崇墉其得此道歟翼傳曰上經首乾坤終坎離下經首咸恒終既濟未濟乾坤坎離其體也咸恒既濟未濟其用也有體必有用此易之所以為易也或曰六子皆乾坤所生何獨坎離相終始為用也自乾之正位來居坤之中而為坎自坤之正位來居乾之中而為離盖中爻乃正位隂陽居中有生之最先者坎陽卦也其體乃隂中之陽故坎亦為隂離隂卦也其體乃陽中之隂故離亦為陽是二物者其氣為隂陽其數為一二其位為南北在天則為日月在人則為道徳為精神四時之行百物之生以下闕易翼傳上經下欽定四庫全書易翼傳下經上宋鄭汝諧撰咸艮下兊上咸亨利貞取女吉從程氏彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣翼傳曰柔上變剛而成兊剛下變柔而成艮柔上而剛下也剛不下柔不上二氣不相與安能相感然不曰感而曰咸則知隂陽雖二端其本則一惟其二端是以生感惟其一本是以感而合咸皆也合也天地以氣感而萬物生聖人以誠感而天下和平天地萬物雖異位其氣則一聖人億兆雖異勢其誠則一觀其所感而其情可見者感生於情也情出於正然後知感通之理象曰山上有澤咸君子以虚受人從程氏初六咸其拇象曰咸其拇志在外也翼傳曰卦言感應之理六爻皆不純乎吉何也卦合而言之全體也爻析而言之偏體也天地感而萬物化生聖人感人心而天下和平咸之全也六爻之所感不同咸之偏也其不純乎吉者以六爻私相應也自初至上皆取人身為象身者我也囿於有我安能无所不感也於有我之中又有所囿焉拇囿於履腓股囿於動心囿於思輔囿於言各當其處而各囿於一能六者以私相應非所謂无心於感應者是以爻辭多凶吝其善者僅免於悔而已初隂也四陽也隂之志欲感陽而從之故如拇之動於下也拇者身之微動之先其不言凶咎者以是淺鄙之為不足言也六二咸其腓凶居吉象曰雖凶居吉順不害也翼傳曰腓在股之下拇之上上下欲動而已順之夫順物而動凶道也惟能居則吉二之居居中也居中則不一於随人故雖順而不害也餘從程氏九三咸其股執其随往吝象曰咸其股亦不處也志在随人所執下也翼傳曰初與二隂也隂感陽而動故為趾為腓三以陽而為艮之主宜其止而不動而亦恱乎上之隂而應之故為咸其股股謂其随腓趾而動也以其不異乎二隂故曰亦不處也執牽也為二隂之所牽執而動故曰所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往来未光大也翼傳曰心有定位不可有定應今指四為心其位定矣有定位而私應於初其應亦定也初其朋也憧憧然往來以求其朋必未能感未感則害其正是以戒之以貞吉悔亡凡戒生於不足也餘從程氏九五咸其脢无悔象曰咸其脢志末也翼傳曰人君之感當使萬物為一體故能无感不通九五下應於二私之心也心累於私故心與萬物不相通脢背肉也背乎心而不通乎心也感物而有不通乎心者其志之淺末僅能无悔而已何足以語感應之理上六咸其輔頰舌象曰咸其輔頰舌滕口說也翼傳曰聖人固嘗以言感人所感不獨在言也今指上為輔頰則囿於言矣獨以滕口說係之自言之外无所感也餘從程氏恒巽下震上恒亨无咎利貞利有攸往從程氏彖曰恒乆也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒乆而不已也利有攸往終則有始也翼傳曰咸與恒皆剛柔相應咸之彖則不著其義恒之彖則曰剛柔皆應恒咸无成心恒有定位也有定位而剛柔相應應其理也无成心而剛柔相應應其私也夫婦必相合君臣必相信此常理也夫婦相合而外乎其家君臣相信而外乎天下曰私可也非所謂感也學者能識時義之變易斯可言易矣餘從程氏日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣從程氏象曰雷風恒君子以立不易方翼傳曰雷以動之風以散之風雷非常物也以非常之物而繫於常又曰君子立不易方何也道者常與變而已君子先立乎其常然後能盡其變其常之不立而曰吾將變以趨時者无忌憚之人也君子觀象以雷風為常則當立不易方能不易方則凡雷之動風之散雖曰不常无非道之常也初六浚恒貞凶无攸利象曰浚恒之凶始求深也翼傳曰上應乎四常也初知以應為常而不知可常者有義也初隂也四陽也以隂求陽求之必深也初巽體巽入也四艮體艮止也彼止而我入之亦求之深也君子誠其心而後交度其徳而後求於其始而求之之深盖未施而責其報未孚而要其誠貞固守此凶也而亦无所利也九二悔亡象曰九二悔亡能久中也從程氏九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也翼傳曰君子嚴威莊肅而濟之以和寛厚慈祥而濟之以剛是以能常也三過乎中而純乎剛乃不恒其徳者既不恒其徳矣且介於二剛之間吾以其剛而上下皆遇剛進退无所容於人則繼之以其羞矣貞固守此吝矣哉九四田无禽象曰久非其位安得禽也翼傳曰二四二爻不言恒而言久詘吾之剛而用之以柔皆變常也雖變也變而得中是亦可久之道也二久於中故悔亡四不得乎中久非其位矣非其位而為動之主動而无所獲也故曰田无禽六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也從程氏上六振恒凶象曰振恒在上大无功也從程氏遯艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉翼傳曰讀易者當别時義之輕重輕重小差失其㫖逺矣說遯者以遯為藏謂隂長陽消乃君子遯藏之時非也遯與否異也否三隂在内小人道長故象曰君子以儉徳辟難不可榮以禄遯二隂方長在内猶有陽也内有陽則君子之道未消故象曰君子以逺小人不惡而嚴則知遯之為言逺也逺去聲也者因其漸長之勢委曲遜避之不與之宻比於上徐有以正之也若隂方長而君子遽為遁藏之計則誰與任其責者此非聖人設教之意曰遯亨所以亨者小利貞也陽曰大隂曰小謂當是時於小者利有以正之也故曰小利貞浸而長也惟其方浸長故不可不早正之三曰畜臣妾吉五曰正志其正之之道與又曰遯之時義大矣哉欲君子深求其義也象曰天下有山遯君子以逺小人不惡而嚴翼傳曰天山不可為遯得意而忘象可也解在前初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也翼傳曰所以成遯者以二隂也初視二為同類視四為正應從二附隂也從四附陽也其進退動止惟在前者是從故於遯之時為尾也夫惟人是從者危道也欲免於危在勿用有攸往而已盖從二則有剥陽之咎從四則失同類之心惟止於下而不往則不犯二者之災初隂之至微也微則易以自免故特發此義六二執之用黄牛之革莫之勝說象曰執用黄牛固志也翼傳曰所以成遯者二隂也初則戒以勿用有攸往二則備言固結其君之情狀盖二所居者中位而應乎君所守者柔順而從乎君執是二者而用之其固至於不可勝說吐活反說解也革固也此其意將以害君子也不言吉凶以示處得其道則吉處非其道則凶故彖曰剛當位而應與時行也五以剛而當君位而下與二應君子觀其時可不思所以有為乎故曰與時行也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也翼傳曰三雖陽而與二隂同體遯而有所係也陽係於隂是為有疾憊惟以臣妾畜三隂而不與之為大事則處之之道得矣大抵小人之欲其始志於寵利而已不以寵利飽其欲而禁之太甚所以滋小人之禍也剥之五曰以宫人寵遯之三曰畜臣妾吉其義一也諸吕方強平勃聼其擅有王爵且假以兵柄北軍一呼士皆左袒其勝者幸也所以畜諸吕者本非其道也先儒以王陵為正而以平勃為非豈過論歟九四好遯君子吉小人否象曰君子好遯小人否也從程氏九五嘉遯貞吉象曰嘉遯貞吉以正志也上九肥遯无不利象曰肥遯无不利无所疑也翼傳曰嘉好也配也故言婚姻者皆曰嘉五應於二視二為嘉惟於二能逺之則貞且吉二曰固志五曰正志固志者二欲以是結其君也正志者五能自正其志則二无所為入矣是乃逺小人之道不惡而嚴若上則不然於二隂无所係應超然於其外者進退在我故曰肥遯肥者綽綽然而有餘裕无所疑滯也大壯乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣翼傳曰陽為大隂為小大壯大過皆四陽也隂在内為過陽在内為壯過為棟橈壯為正大二者甚相逺也故卦之下惟利貞二字而已其辭約其㫖深學者宜有得於斯餘從程氏象曰雷在天上大壯君子以非禮弗履從程氏初九壯于趾征凶有孚象曰壯于趾其孚窮也從程氏九二貞吉象曰九二貞吉以中也從程氏九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也翼傳曰居健之極有應在前鋭於進也然乗承皆剛動則見困故小人用之以壯若君子則用之以罔罔亡也謂亡其剛也物之極者必變故設二戒若不顧慮如羝羊之觸藩則羸其角矣九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩决不羸尚往也翼傳曰居四陽之終其壯易過故必正吉則悔亡羣陽並進非二隂之所能止藩決不羸其道通也壯于大輿之輹其行健也夫四居壯之極而不以壯為戒何也凡物之理有所激則必争无所激則樂易而争息水之奔以激乎石也行乎平地則寂焉而已四雖極壯前遇二隂二隂非動之主能順以聼之四无所用其壯矣烏用戒焉六五䘮羊于易无悔象曰䘮羊于易位不當也從程氏上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也翼傳曰上與三為正應故三來觸之藩限隔也三居下體之終上居上體之終終則有限隔之象故皆言藩也晋坤下離上晋康侯用錫馬蕃庻晝日三接彖曰晋進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庻晝日三接也翼傳曰此諸侯之卦也下順上明諸侯承王之象也人臣之道雖貴於柔順然内而左右侍御僕從之臣任弼違糾繆之責一於柔順則非忠矣惟諸侯分職於外欲其承令而禀命故柔順者尤諸侯之所貴也進而上行下以柔交乎君也麗乎大明上以明照其下也是以侯為康治之侯而君之寵侯者至於錫馬蕃庻晝日三接也坤為衆為牝馬故有錫馬蕃庻之象離為日為中虚故有晝日三接之象餘從程氏象曰明出地上晋君子以自昭明徳從程氏初六晋如摧如貞吉㒺孚裕无咎象曰晋如摧如獨行正也裕无咎未受命也從程氏六二晋如愁如貞吉受兹介福于其王母象曰受兹介福以中正也翼傳曰六五在上以柔遇柔進而愁也上明下順俱得中體必受福也或謂上无應援進之之難是以愁如非也夫二中正而順體五居中而明體使二以无應援而愁如安有无應援者而能受兹介福也使二以未得介福而愁如安有中正順理者以未得位而戚戚也然則二何以愁也所事者王母也事王母者君子以為憂也六三衆允悔亡象曰衆允之志上行也從程氏九四晋如鼫鼠貞厲象曰鼫鼠貞厲位不當也翼傳曰晋以柔進也當柔進上行之時四獨以剛乘之是亦不當位也上比六五而貪據髙位下拒三隂而畏其上行非鼫鼠而何餘從程氏六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也從程氏上九晋其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也從程氏明夷離下坤上明夷利艱貞從程氏􅂏曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之翼傳曰明入地中其紂之事乎然文王用之則為内文明而外柔順箕子用之則為艱貞而晦其明卦有所居之時則同而所用之義則異亦有所用之義則一而所遇之時不同學者能識時義之變易則易无餘藴餘從程氏象曰明入地中明夷君子以莅衆用晦而明從程氏初九明夷子飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也從程氏六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也從程氏九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也從程氏六四入於左腹獲明夷之心于出門庭象曰入于左腹獲心意也從程氏六五箕子之明夷利貞象曰箕子之貞明不可息也翼傳曰天下不可一日无君也其不可无君者不可一日无􅂜倫也五君位也居君位而夷其明君道息矣君雖不君然君之道其可息乎故五不言君而言箕子之利貞箕子雖傷利在貞而不死者以天之􅂜倫待己而後傳也六五居中箕子之中也君失是中而箕子得是中箕子傳之而後天下萬世皆由是中以生故曰箕子之貞明不可息也使明而可息則箕子當死于商武王不必訪于箕子矣五不言君而言箕子君道在焉故也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也從程氏家人離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣翼傳曰離下巽上而為家人彖曰女正位乎内男正位乎外此據二五而言也以全卦論之離中女也巽長女也家人无取於男獨取於女何耶長女處下而巽順乎陽中女居中而附麗乎陽婦人之義有三從離巽盖盡從陽之義此女之正也虞舜之化於二女見之文王之化於后妃見之修之奥穾之間而達之於君臣父子兄弟之際此離巽所以成家人之卦也卦辭惟曰利女貞意可見矣餘從程氏象曰風自火出家人君子以言有物而行有恒從程氏初九閑有家悔亡象曰閑有家志未變也從程氏六二无攸遂在中饋貞吉象曰六二之吉順以巽也從程氏九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也從程氏六四富家大吉象曰富家大吉順在位也翼傳曰所應者陽又介於二陽之間隂巽在位以虚受實富家之義也順而能富吉莫如之餘從程氏九五王假有家勿恤吉象曰王假有家交相愛也從程氏上九有孚威如終吉象曰威如之吉反身之謂也從程氏睽兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉翼傳曰長女中女而為家人中女少女而為睽中女正也少女乗二陽非正也一正一不正亦所以為睽餘從程氏天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉從程氏象曰上火下澤睽君子以同而異從程氏初九悔亡䘮馬勿逐自復見惡人无咎象曰見惡人以辟咎也翼傳曰居睽之初在卦之下必安静以俟之寛裕以容之睽斯合矣九陽體上行故為馬睽而无應故䘮其馬䘮馬勿逐久則自復安静以俟之也惡人者以其戾于己也睽而无應无非戾於己者拒絶之則愈戾能受之則可辟咎寛裕以容之也合睽之道莫善於斯故曰悔亡餘從程氏九二遇主于巷无咎象曰遇主于巷未失道也從程氏六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也從程氏九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也從程氏六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也翼傳曰宗言同黨五視二為宗也膚言同體二視三為膚也當睽之時隂陽急於求合二雖比三之隂其應五也專不恤同體之愛而噬之五之往求於二宜其合也合則有慶矣餘從程氏上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪㓂㛰媾往遇雨則吉象曰遇雨之吉羣疑亡也翼傳曰疑心生於多妄妄見生於久睽久睽之人无適而非疑也睽合則心平心平則疑釋餘從程氏蹇艮下坎上蹇利西南不利東北利見大人貞吉從程氏彖曰蹇難也險在前也見險而能止知矣哉蹇利西南徃得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉翼傳曰利見大人指五而言也不利東北而利西南為遇險者言五以剛中居尊濟天下之險非擇地而後處故五位於險中而曰當位貞吉以正邦也少康以羿浞之難而興夏宣王以玁狁昆夷之難而興周不自處於險烏能濟險哉餘從程氏象曰山上有水蹇君子以反身脩徳從程氏初六往蹇来譽象曰往蹇來譽冝待也從程氏六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也從程氏九三往蹇來反象曰往蹇來反内喜之也從程氏六四往蹇來連象曰往蹇來連當位實也翼傳曰四雖比五之陽然隂柔不足以濟五之蹇故往則愈蹇不若來附九三而為連也所以連九三者三處當其位而且實也隂為虚陽為實九五大蹇朋來象曰大蹇朋來以中節也翼傳曰諸爻皆以往為失來為得惟二五不言往來君臣當相與以濟天下之蹇此而往來其誰任蹇難之責哉故二曰蹇蹇五曰大蹇大蹇者身處坎險之中以濟天下之蹇也我能濟蹇則其衆來歸故曰朋來朋來異於諸爻之來也節守也則也无往无來所處中正而天下取節焉也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也翼傳曰屯與蹇上皆坎體皆隂柔之才屯則動乎險中動極必窮故乘馬班如泣血漣如蹇則見險而止止極則變故往蹇來碩吉利見大人碩寛裕也蹇之紓也利見大人從五也五陽剛貴也或曰四比五而不能從上比五而利見何也曰四從五則為往蹇不貴往也上從五則為來蹇貴來也蹇見險而止止者貴來而不貴往也解坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉從程氏象曰雷雨作解君子以赦過宥罪從程氏初六无咎象曰剛柔之際義无咎也翼傳曰難解之初或紛紛而未定者知愚貴賤未當其處也初以柔居下上應九四之剛剛柔之相際如是安得有咎餘從程氏九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也從程氏六三負且乘致宼至貞吝象曰負且乘亦可醜也自我致戎又誰咎也翼傳曰難之未解君子小人尚雜處也既解則當各安其所故爻辭多以君子小人為言三隂柔而不中正乃於既解之後間處二陽之中上負九四而下乘九二負可也負而且乘不可也小人而為小人之事乃可以自安小人而乘君子之器盜思奪之矣餘從程氏九四解而拇朋至斯孚象曰解而拇未當位也翼傳曰四之所自處者不當宜小人之所附麗也必解去之然後孚於其朋朋剛陽之類謂二也拇在下之隂謂三也六五君子維有解吉有孚于小人象曰君子有解小人退也翼傳曰益之戒曰任賢勿貳去邪勿疑疑貳不自信之心也上不自信則其下亦莫之信如使世之小人皆信上之所用者必君子而所解者必小人則必改心易慮不復有投隙抵􅇖之望惟未孚于小人此小人所以猶有覬幸之心也五解之主也以其隂柔故有戒意上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也翼傳曰釋者多指公為上六遂失其義繫辭極言其藏器待時之羙安有難解之時以隂柔處上謂之善藏器待時可乎所謂公者非上六也言公於此爻當用射隼之道也隼飛翔于上善為鷙害指上之隂而言也墉内外之限在墉之上而未出於外指上之位而言也難既解矣君子小人欲各當其處上乃以小人之才處乎内外之際公於此能射而去之則解道成矣解之極動之終而射去小人是謂藏器於身待時而動舜必俟鯀之久任然後殛之三苗罪極惡盈然後竄之湯之征葛文王之伐崇所以動而不括出而有獲者皆此道也卦爻變義若此者衆損兊下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行翼傳曰損下之陽以益上之隂故謂之損損不可常也善用損者大抵有三曰有孚曰元吉曰无咎損者損下以益上也賦斂力役未免損下然取之以其制有孚也損者損已以益人也懲忿窒慾日損其不善元吉也損者損文以就質也二簋失之儉然寜儉禮之本无咎也三者可貞固而守之是謂利有攸往餘從程氏象曰山下有澤損君子以懲忿窒欲從程氏初九已事遄往无咎酌損之象曰已事遄往尚合志也翼傳曰損下益上故下當損而上不當損損剛益柔故剛當損而柔不當損初剛而在下四賴其損也已事遄往謂在已所當損之事則冝速往以益上也益乎上則與上合志故无咎雖然下者上之基陽者隂之本過於損則基本或傷故必酌損之量其所受随器而止酌之義也九二利貞征凶弗損益之象曰九二利貞中以為志也從程氏六三三人行則損一人一人行則得其友象曰一人行三則疑也翼傳曰三本陽也與初二兩爻同為一體今損三以益乎上三人行則損一人也三既為隂與四五兩爻同為一體今六三獨與上交一人行則得其友也若率三爻與之同往則配合不専疑而不受矣繫辭即此爻以明天地男女交感之理盖言一隂一陽皆致一也六四損其疾使遄有喜无咎象曰損其疾亦可喜也從程氏六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也翼傳曰凡曰或益曰有他吉曰有隕自天曰自上祐皆謂不期於得而得之也損之爻惟上得益五非得益者也然五冲虛中順而居尊位雖不期於益必有益之者矣餘從程氏上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也翼傳曰上九坤體也得乾之施變而為陽則在上者已有餘矣位乎上而陽有餘乃復行損損莫甚焉惟不損乎下而以其有餘者益之然後无咎非特无咎是謂貞且吉利有攸往者以剛陽而施益无所不利也得臣无家者施益則得民之歸非有逺近内外之間也禹稷拯天下之飢溺其心如是故曰大得志也益震下巽上益利有攸往利渉大川彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行翼傳曰巽之致用未有如益者故曰木道乃行利渉大川木之用也乾施而為巽坤生而為震故曰天施地生言天先施則地乃生是之謂損上益下又謂之自上下下也餘從程氏象曰風雷益君子以見善則遷有過則改翼傳曰雷風恒君子以立不易方風雷益君子以見善則遷有過則改風動雷散本不恒也于不恒之中而體恒則立不易方於不恒之中而盡變則遷善改過恒而有不恒者存焉不恒而有恒者存焉所以貴乎君子之觀象恒曰雷風益曰風雷上動而下順男先而女從恒也上順乎下男下於女益也初九利用為大作元吉无咎象曰元吉无咎下不厚事也翼傳曰損之上三爻惟上為得益益之下三爻惟初為得益夫得益者非以是而自私也故損之上利有攸往得臣无家益之初利用為大作為大作者當為大益之事也然在下而為大益之事位未崇也誠未孚也必元吉然後无咎元大也吉善也其貴於大善者以其位非厚事之地也餘從程氏六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也翼傳曰損惟上爻得益益惟初爻得益損之五益之二皆非得益也然二爻皆以柔順之體而有虚中之象夫虚中者雖不汲汲於求益人莫不願益之故二爻皆曰或益之或者得之於无所容心二曰自外來五曰自上祐是也古者寳龜而貨貝五貝為朋龜擅十朋之價乃神物也二五虚中无我不憧憧於所益非惟人欲益之雖龜之神智所弗克違守之以永正則吉以其質柔故戒之也曰王用享帝王非二也王用此以享帝必獲天祐也湯之伊尹太甲之阿衡太戊之伊陟臣扈祖乙之巫賢武丁之甘盤皆用之以格帝也餘從程氏六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也翼傳曰三隂柔而下體當得益而无有益之者稔嵗曰豐歉歳曰凶古者遇凶嵗則事必殺禮而處凶事者必貶損以從約三下體當求益於上然三動之極位之尊且過乎中動極則多躁位尊則好大過中則已甚以是進廹上體以求益必以多欲而見疑矣故三之自處當如凶事之用深自貶損乃可以无咎能自貶損必有孚必中行以是告於上而通其誠然後能固有此益也古者臣見君而執圭圭通誠之物也六四中行告公從利用為依遷國象曰告公從以益志也翼傳曰四上體當施益也其體巽其才柔是皆不足以致益所利用者依遷國也初九上而為四六四下而為初二者交變故四視初為遷國遷國剛陽也為可依也依其所應近乎私利益者必中行无私以告公則必見從其見從者告之以益之之志非私也將求剛陽以成吾益也三四皆曰中行中不偏也謂其不足於中故告之九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也從程氏上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也翼傳曰巽極而居之以剛在上而下係乎動立心不恒也以是居益之極求益无厭也求益无厭而人莫益之者身不安而動心不易而語交不定而求皆偏也偏者知責乎人而不知自責是以或擊之也餘從程氏夬乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往從程氏彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也翼傳曰去小人之道雖健而當說雖決而貴和不說不和而行之以暴速禍也五陽上行猶曰剛長盖不以剛廹柔而使吾道既盛則我長而彼自消矣王允之徒不知此理卒隕身而䘮國訓注沾沾小人乃欲以燕伐燕尤見其不知量也餘從程氏象曰澤上於天夬君子以施禄及下居徳則忌翼傳曰去小人者晦其徳可也居徳則忌之者至矣初九壯于前趾往不勝為咎象曰不勝而往咎也翼傳曰趾在前進之始也陽剛果於上進壯于前趾也陽微而位下且不任夬決之責有所往則不勝徒為咎爾故戒之朱雲以未見信之小夫欲去師傅之張禹難矣哉九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也翼傳曰惕懼也號警也二亦不任夬決之責而能以剛居隂所處得中其於小人也未甞用壯以勝之惟知警懼以備之既備則不足憂矣恤憂也莫夜隂也小人之害君子惟務隂肆其害故備之九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也翼傳曰在夬決之時雖當掦於王庭若三則與上居相應之地相應則情雖交而多疑故三之處夬當委曲致慮焉頄顴骨也剛而見于面者也君子之去小人晦其徳深其機是以能決去之三以剛居剛失之太果若決之之志見于顔而徳未能勝而先正機未可𤼵而先露凶道也故告之曰君子夬夬之道當捨其朋而獨行恃吾之朋而往廹之窮則變矣遇雨者以其相應而和也若濡者雖與之和處之如受其汚也衆或疑我之不決而愠之而吾心則期于必決而後己故終无咎平勃之決諸吕葢得是理三與五任夬之責而又純陽皆言夬夬決之至也九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也翼傳曰衆陽皆趨於上三其正應而四獨乘之故臀无膚而居不安也以陽居隂與上同體未能進而前故其行復次且也從君子而不果勝小人而不力九四之謂張横渠曰牽羊者遜而先之如是悔亡雖有是言也而不信葢羊之性很居前而力挽之則忿而不行却行而使之先則行矣四當若牽羊然遜三陽而使之進則能成夬決之功然四不足於剛安能聞此言而信之也九五莧陸夬夬中行无咎象曰中行无咎中未光也翼傳曰三應乎上五比之三謀所以去小人者臣道則然也五君也謀非所當用惟當揚庭以決之以五之尊且全乎剛行之以中則為无咎然亦不光大也何也聖人之於小人非貴於誅而絶之也誅之孰若使之歸吾仁絶之孰若使之畏吾義殛鯀放驩兠竄三苗堯舜之心亦以是為病也莧陸本草云一名商陸其根至蔓雖盡取之而旁根復生小人之類難絶如此故以是示意焉上六无號終有凶象曰无號之凶終不可長也翼傳曰號警懼之意也身孤而位蹙勢窮而道消能知自警亦君子之所容也无號而怙終則凶矣辭若戒然庻幾其或改也嗚呼小人至難去也故聖人於此一卦深致意焉漢唐以來惟平勃幸勝之其他用是以召禍者不可勝紀由不識夬卦之義也大抵國之有小人猶人之有疾也治疾者能使疾去而身安則為善治疾也必欲以剛劑針砭決去之疾去而其身亦亡矣故彖曰健而說決而和又曰告自邑不利即戎所尚乃窮也行之以和說先之自治而又以即戎為不利則是夬決者未始以果為貴也初以用壯為戒二以能備為善三任夬之責而以潜晦委曲為无咎五為夬之主而以莧陸夬夬為未光上以一柔乘五剛亦庻幾其不怙終而能改焉聖人之於小人曷甞欲逞其決必殱其類也哉泰之為言安也内君子外小人使之各安其處而已四陽為壯五陽為夬聖人不以為安是以諄諄而為之戒姤巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也翼傳曰姤者遇也遇者坤始交乎乾隂陽相遇也勿用取女者以一隂而遇五陽隨所遇而合莫適所主故不可取是女而與之長也或謂一隂既生漸進而敵陽故勿用取是女恐非其㫖天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉翼傳曰隂陽相遇其義甚重坤之初位來交乎乾其位則建午之月萬物於是而相見故曰天地相遇品物咸章也自遇而為遯則其臣非矣自遯而為剥則其君非矣遇則二五以剛相遇无所往而不利故曰剛遇中正天下大行也天地君臣皆貴於相遇其時與義豈不甚大矣哉象曰天下有風姤后以施命誥四方翼傳曰上之用柔於下者莫大於誥命也餘從程氏初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也翼傳曰金堅物也柅止物也金柅謂二也一隂初長莫適所遇不牽於近而欲有所往則所見皆凶惟近繫于二則為貞且吉矣此羸豕也力雖微而其志則蹢躅蹢躅者隂躁而不安也惟信其蹢躅則不可不有所牽制故曰柔道牽也此皆言隂陽致一之理非以將盛為戒九二包有魚无咎不利賔象曰包有魚義不及賔也翼傳曰隂而在下者魚也指初而言也陽比乎隂隂比則必合二之比初亦既合矣苟使之有所逞是必有咎非惟有咎亦非義也義者有其所當有也不能有而及賔非隂陽致一之道豈義也哉賔非獨言四也二為初之主凡非主者皆賔也包不必音庖包畜也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也翼傳曰初與二遇矣三同體而无所遇故不安於下而臀无膚也欲進而上之則三陽在前亦无所遇故復次且也進退无所遇亦危矣雖危而无大咎者以其行未有牽制也人惟牽制於所欲无所遇則為咎若四之不遇初而起凶是也三不牽於初雖不遇而進退在我豈有大咎哉九四包无魚起凶象曰无魚之凶逺民也翼傳曰隂陽之合近者之利逺者非利也四既逺於初矣起而争之則凶也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也翼傳曰張横渠謂有隕自天為文王事紂之事程子謂至誠求賢无有不遇如髙宗遇于夢寐文王遇于耕釣是也二說雖異而理則一初一隂也已與二遇自二以上皆无所遇五居尊位亦无所遇焉故五當以把包瓜也五髙而在上把也初美而在下瓜也瓜之與把雖甚遼絶然攀縁而上亦有可遇之理五能含章雖不汲汲於求所遇要其久將有隕自天而得所遇矣在天曰命在人曰志篤吾之志而不舍天之命志之所至命亦至焉文王之得民髙宗之得賢志不舍命故有隕自天也凡易言含章謂其中有美也五位中正美莫大焉能含晦其美以俟之終必遇也上九姤其角吝无咎象曰姤其角上窮吝也從程氏萃坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往從程氏彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣從程氏象曰澤上於地萃君子以除戎器戒不虞從程氏初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也翼傳曰萃有成卦之義釋者多遺之故爻辭或不得其㫖彖言順以說剛中而應此卦之才也所以成卦者不専在是五君位四大臣之位二位以剛陽同徳聚於上所以為萃也初之隂柔必萃於剛陽然萃於四則亂乃萃也何也天下之理定於一也一則聚二則分四五雖同徳而下之所歸當歸於五五君也君不可分其所聚也初雖信於四而其信必不終以其亂乃萃也號者攄中心之所欲言也握者合而為一也若能號四與之為一樂附於五而不恤其他則往而无咎不然則徒亂其志非所謂聚也六二引吉无咎孚乃利用禴象曰引吉无咎中未變也翼傳曰五有四以貳其萃二於五必相挽援則吉而无咎相挽援者以誠為貴故曰孚乃利用禴禴薄祭也世之盛其禮以相接者皆其誠之未孚以二之中應五之中其中不變何必盛文飾以相交也哉六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也翼傳曰下二隂皆萃於陽矣三獨无附故咨嗟怨嘆而无攸利雖然當萃之時下欲萃於上上亦欲下之萃於我三不以无應之故能往歸於上雖小吝而亦可以无咎與上本不相得小吝也上體兊說能巽而受之无咎也上非上六謂在上之陽也九四大吉无咎象曰大吉无咎位不當也翼傳曰其位近其徳同其為下之所歸亦同自非所為至善則其君病之烏能无咎戒之也凡言位不當其義不一此所謂不當者為其以剛陽廹近其君也九五萃有位无咎匪孚元水貞悔亡象曰萃有位志未光也翼傳曰比之為顯比一陽而受五隂之比也大有之能有大一隂而有五陽之大也萃之五有四以貳之五必有其位而後无咎者以其萃之道不一也不一則有不孚於我者烏可不知自反之道故元永貞則悔亡元善也以善長人而永久貞固以持之則免於悔以五之尊一有所貳惟无咎免悔而已其志安得而光大哉上六齎咨涕洟无咎象曰齎咨涕洟未安上也翼傳曰无徳无位其下莫附當萃聚之時以此居上其能安乎齎咨涕洟无所歸咎也升巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也翼傳曰升與晋其義相近晋則柔在下而明居上乃諸俟承王之義升則巽於下而順於上乃文王事紂之義用見大人者謂於升之時其所用者在見大人大人者如文王是也見之則得所依歸而不必憂矣南征者捨暗而趨明明亦謂文王也象曰地中生木升君子以順徳積小以髙大從程氏初六允升大吉象曰允升大吉上合志也翼傳曰文王初為諸侯其允升乎允信也雖處於下其升可信也升之六爻无一不吉非文王誰足以當之盖文王之柔升異於人之用柔也上合志者非獨言四也凡在上者其志无不合也九二孚乃利用禴无咎象曰九二之孚有喜也翼傳曰處危疑之地者惟誠意足以勝之凡言利用禴利用享祀利用祭祀皆所以釋危疑也萃之五有四以貳之二雖與五相應盖居可疑之地也升之時自下而上升也二與五為應五君位也二雖在下而剛陽必上升亦居可疑之地也故二文皆曰孚乃利用禴困之二五皆處於困困者危地也二爻皆剛陽本非相感惟其處困是以交相求故曰利用享祭也文王卒自免於羑里孚乃利用禴也九三升虚邑象曰升虛邑无所疑也翼傳曰伐宻伐崇墉皆此爻之義六四王用亨于岐山吉无咎象曰王用亨于岐山順事也翼傳曰文王有君民之大徳繫之於二不可也有事君之小心繫之於五不可也四尊而居下正文王之事餘從程氏六五貞吉升階象曰貞吉升階大得志也翼傳曰柔以時升所以正且吉者若循階而升易而有漸也凡言大得志者謂聖賢得遂其願欲也所謂遂其願欲者非志於得君位也如乾之九五乃位乎天徳是也上六冥升利于不息之貞象曰冥升在上消不富也翼傳曰六爻大抵皆文王之事文王得百里之地而君之至於三分天下有其二文王之升積小以髙大巽於下而以柔升也五之貞吉升階厥徳不囘以受方國也上之冥升謂紂猶在上其升猶冥冥也文王不以冥冥之故而不息之誠惟以貞為利也消不冨者謂自處退抑之地不以富盛廣大自居是以不受命也困坎下兊上困亨貞大人吉无咎有言不信彖曰困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也翼傳曰九二陷於中九四九五為上六所揜是以為困以上下卦言之則合坎兊而成也坎難也兊說也困而安於難則不失其所亨困而取說於人尚口乃窮也君子觀卦之辭則知處困之道餘從程氏象曰澤无水困君子以致命遂志翼傳曰知其不可求而聼其自至焉致命也在命者不可求在志者則可遂所謂從吾所好也初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也翼傳曰剛揜于柔為困柔亦困乎成卦之義以柔揜剛爻則皆困而取義故剛困終必亨柔困困之甚初以隂柔處下困而无所託如臀之困乎枯木不可安處也幽谷坎底也隂柔而居坎底雖前有剛陽盖三嵗之乆不能有所覿也或謂初比二而應四何困之極二四雖剛陽在我者隂闇无所覿安能遽出於困三嵗言困之久也九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也翼傳曰困之二即需之五皆坎體皆以酒食言陽陷於險其終必亨以酒食自養俟其亨也二雖困能有以自養則上必有求之者朱紱天子之服言五也五云方來言即乎二也享祀者盡誠意以交乎幽明也剛揜於柔未能有為二五本非相應五以處困而求二二當盡誠意以交之誠意既通乃有相與拯困之道不居易以俟用吾之剛以征者乃凶道也征雖或凶以下從上困而相援義非有咎也慶者吉之至坎中之陽是之謂有慶六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也翼傳曰進阨于四故困于石退乘二之剛故據于蒺藜入其宫也其宫可入而以柔遇柔非其配也以此處困不祥莫甚焉九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也翼傳曰四方處困不求所以自免者而其來徐徐志乃在下何也四於初其位應也其情感也安有居感應之地而漠然不相恤者程子所謂寒士之妻弱國之臣各安其正而已苟擇其勢而從則惡之大者凡易言往往外也言來來内也四欲來從初而困於金車故其來徐徐金車剛而載己者謂二也四居不當位又困於金車雖吝而有終者有初以相與終必合也合則從正必能拯困也楚漢之際司馬欣董翳之徒困於楚則降楚困於漢則降漢盖不知有終之道九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也翼傳曰以陽居陽極乎剛也揜於上者我則劓之揜乎下者我則刖之所以去其間己者以求合于二也赤紱下之服困于赤紱謂其下之未合也惟能不用吾剛徐徐以求之則二五皆以中直相遇其終必合人鬼曰享天神曰祭其以是為上下之别歟餘從程氏上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也翼傳曰其應在三三以柔附己而牽之葛藟也所比者五五以剛載己而難安臲卼也既為二者所困自言動則有悔者是乃有悔不以為悔而征則吉也盖困極必通前无所揜惟其柔之不能征也故自謂動悔因其困極而當通也故告之以征吉不以曰加之則其義難别矣上曰征吉言能征則吉也下曰吉行言知吉則行也二言相為表裏其歸則一易翼傳下經上欽定四庫全書易翼傳下經下宋鄭汝諧撰井巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶翼傳曰永嘉鄭景望曰得之何希深有蜀君子謂之曰易有性命二卦亦識之否余曰易皆性命之理何獨二卦也余頗不然之雖景望亦不以為然也余自玩易以來每見易之卦皆兩兩相對以變故兩卦之義或相反或相湏或相類其義无不相闗者至讀困井二卦未見相闗之義余疑之久矣疑之乆故思之深思之深故渙然而悟所謂性命二卦其在是乎夫困之為困謂剛為柔所揜有言而不信也人之困也豈其所自為哉皆命也故大象曰君子以致命遂志致之為言知其不可求而聼其自至也在命者雖不可求而君子則不謂命而求之於性井言改邑不改井无䘮无得葢言性也考之於象澤无水為困此命也澤雖无水而井則有水焉此性也君子知澤或涸而井則不涸是以致命而盡性盡性者不可一日而不用其力也譬之井雖有水若汔至而未繘井乃羸其瓶則井非我有矣人雖有性若所習有作輟之異所存有人欲之私則性非我有矣二卦相為表裏學者未之識也蜀君子不知何人其深於易者乎彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也從程氏象曰木上有水井君子以勞民勸相翼傳曰勞民而勸相所謂勞之來之輔之翼之使自得之又從而振徳之不惟盡己之性而又盡人之性養之而不窮也初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也翼傳曰輕清陽也重濁隂也輕清為泉重濁為泥餘從程氏九二井谷射鮒甕敝漏象曰井谷射鮒无與也翼傳曰二剛中井之有泉者惟乘初之柔柔則不實是謂谷射鮒下既乗虚上亦无與无與則所汲者亦敝漏之甕也餘從程氏九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也翼傳曰九三以陽居陽井之至渫者渫潔也井渫而乃不食以所居不中非井邑之㑹故不食也不食則井不自惻行道之人為之惻爾是豈終於不食哉其可用汲者必明潔之人也餘從程氏六四井甃无咎象曰井甃无咎修井也翼傳曰初六最下井之泥也上六極乎上井之收也六四在井之間而所居得正井之甃也甃所以去􅁾而納清也上比於五為五之捍故為甃四甃則五亦㓗矣故无咎九五井冽寒泉食象曰寒泉之食中正也上六井收勿幕有孚元吉象曰元吉在上大成也翼傳曰井以寒冽為貴道以中正為貴九五之不言吉其吉可知也井之上出猶性之及物也繫辭曰精義入神以致用也精義積也致用施也積而不施其道息矣故聖人盡己之性以盡人之性盡人之性以盡物之性盡物之性至於賛天地之化育皆致用也收而勿幕盖積之而施也積之也博則其用亦不窮矣餘從程氏革離下兊上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉翼傳曰文明以察物理和說以順人心如是而革可致大亨而得正新故之悔皆可亡也天地隂陽推遷改易而後四時成王者之興受命於天故易世謂之革命天道變改世故遷易革之至大也故賛之曰革之時大矣哉餘從程氏象曰澤中有火革君子以治歴明時從程氏初九鞏用黄牛之革象曰鞏用黄牛不可以有為也翼傳曰居位之下革之而人未必從當革之始遽革而人未必信其才雖剛陽然才非所宜用也鞏固也黄中也牛順也固執中順之道循理而變通可也自我有為不可也或謂變革者果无取於才乎天下之理窮則變變則通惟中與順而已中則不過順則不逆革非自我為也商鞅李斯出私意以立制度卒禍秦而亡之鞅斯非不足於才不知中順之理也革而中且順豈有以改作而亂天下者哉於革之初言之欲其謹於始也六二已日乃革之征吉无咎象曰已日革之行有嘉也翼傳曰在下而變革聖人之所重也二居下體乃有如是之美居二中也從五順也中且順故已日乃革之已日久也乃然後也久然後革之往則吉且无咎故曰行有嘉也於二言革之道於五言革之效其諸以中為美歟九三征凶貞厲革言三就有孚象曰革言三就又何之矣翼傳曰三居明之極燭見革之之理然處非其位故以征則凶雖正亦厲惟用己之明而議天下之變則取信於人矣言行則道亦行不必有所之可也三就云者自初至三有三就之義惟三就則議之之審人之所孚也九四悔亡有孚改命吉象曰改命之吉信志也從程氏九五大人虎變未占有孚象曰大人虎變其文炳也翼傳曰革之道久而後信五與上其革之成乎五陽剛而中正居尊而說體盡革之美是以未占而有孚也凡革之初雖聖智者難之葢事功未見其成而人情難與慮始信之者寡矣五革之成也其文曉然見於天下道徳之威望而可信舜之法度彰禮樂著周公制禮樂以文太平若卜筮㒺不是孚虎變之謂也餘從程氏上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也翼傳曰初明體而剛陽曰不可以有為上兊體而隂柔乃有如是之吉人情難與慮始可與樂成惟革之時見之初九君子也以其居革之始故其有為也難上六小人也以其居革之終故亦順以從君曰革面者革之而當必非小人之謀既革而成小人亦不得而非之其勢不得不革面也革道既成故戒曰征凶居貞吉小人専指上也言革道之成在君子則豹變至若上之小人惟革面而已葢上為兊之主兊說順也故有順以從君之義五言大人謂君也上言君子謂臣也虎豹示君臣之别也鼎巽下離上鼎元吉亨從程氏􅂏曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨從程氏象曰木上有火鼎君子以正位凝命翼傳曰以象言之則其器為鼎以鼎言之則其用為烹飪以烹飪言之則其用為享上帝為養聖賢然鼎之義不止於是也革以改命鼎以定命知革而不知鼎則天下之亂滋矣周公定鼎于郟鄏體國經野建中立極所以定民心而重國本也初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也翼傳曰鼎重寳也不可顛也然定命之始未免猶有所革而取新也故詳其義於初初居下乃鼎之趾必顛趾者乃出否也否不㓗也否出則美實可全此捨惡而取善也猶之妾也不可使從上也其可從上以子也子貴則母貴此捨賤而取貴也凡取新之義必捨惡而取善捨賤而取貴期合于義故曰未悖也初之應乎四顛趾也從貴也柔而應於上必有此義乃可九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也翼傳曰初為足中三爻為腹五為耳上為鉉足隂腹陽耳虚鉉剛鼎之象與義也二剛中乃實之美者上應於五宜見食也以三四間之故五之應二不専也仇對也五之謂仇間而未合仇有疾也君子美在其中義不苟合彼有間而不能我即我得其所以自全者故吉也彼不我即我謹所之理之正者久而必合是以終无尤焉九三鼎耳革其行塞雉膏不食方雨􅃜悔終吉象曰鼎耳革失其義也從程氏九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也翼傳曰五藉四以自安也四之才雖剛然居柔而應柔上實而下弱是以覆公之餗也餗覆自我辱莫如之故其形渥汗而凶也位尊則責重任大則難勝五鼎之主也不擇人以當責任比四而合乃從而信之曰信如何也夫子之歎歟六五鼎黄耳金鉉利貞象曰鼎黄耳中以為實也翼傳曰五為鼎之主故以耳鉉兼係之黄中色也金堅剛也其位在中黄耳也以柔資剛而又居剛金鉉也措之則安舉之則行鼎之為鼎皆耳鉉之功故利在於堅正也惟以中為實則鼎之義全矣上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也翼傳曰五曰金鉉上曰玉鉉金剛而能變玉温而不變以五之柔而資上之剛其所貴者金鉉也以上之剛而濟五之柔其所貴者玉鉉也二爻以耳鉉相資剛柔得節故大吉而无不利鼎至扵上鼎之成也鼎成於終鼎之定也事至於成且定者未有不貴於剛柔之得節也周之定鼎其上九之時乎震震下震上震亨震來虩虩笑言啞啞震驚百里不䘮匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也從程氏象曰洊雷震君子以恐懼修省從程氏初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也翼傳曰其辭與繇辭同震之㫖在焉餘從程氏六二震來厲億䘮貝躋于九陵勿逐七日得象曰震來厲乘剛也翼傳曰動有順乎理者有廹於勢者夫理惟其當而已矣苟廹於勢而不得不動是亦理也初方進之陽也二乃乘之二雖中正柔而不果於動盖初之所廹者廹之而不動則危矣故二之動不可徇所利不可有所安世之苟且而不動者皆安與利害之也貝寳貨也億度也度寳貨之可䘮而䘮之不懐利然後能動也躋升也九陵險阻之地也不憚九陵之險而升之不苟安而後能動也避害以自全静退以觀變雖不逐逐於安利盖无所利无所安乃安利之至七日卦之一變事定則必得其所謂安利也晋重耳享室家乘馬之奉乃欲安於齊沛公既入闗亦利宫室帷帳子女之羙而欲安之晋難未靖項氏方強是豈可安之地惟子犯張良為能知幾也六三震蘇蘇震行无眚象曰震蘇蘇位不當也翼傳曰曰來蘇曰蘇息皆安緩之意三逺於初陽非有廹之者然處位不當進而犯剛惟蘓蘓然則往而无眚九四震遂泥象曰震遂泥未光也翼傳曰四與初為成卦之主初一陽居下陽必上升故恐懼可以致福四雖升而陷於重隂陷則泥而不通烏能光大哉六五震往來厲億无䘮有事象曰震往來厲危行也其事在中大无䘮也翼傳曰往則為動之極來則遇四之剛往來皆厲所億慮者在不䘮其所有之中爾二五皆乘剛也二居下體未止其所不得不動五所處君位也處君位不可以妄動故以无䘮厥中為大也上六震索索視矍矍征凶震不于其躬于其鄰无咎㛰媾有言象曰震索索中未得也雖凶无咎畏鄰戒也翼傳曰震有二義有震動之震有震懼之震此爻辭有二震字兼二義也上言震索索此謂震懼也盖上以隂柔之資而居一卦之上其中无所得不能自安故震索索而氣不充視矍矍而神不固言其震懼之過征則凶也下言震不于其躬此謂震動也四為震之主而逺於上上與五為鄰而逺於四四之動惟廹於五而不廹於上故曰不于其躬于其鄰躬謂上之身鄰指五而言也夫不廹於我而廹於鄰我能畏鄰之廹而為之備戒雖凶亦可无咎何也人之過於恐懼者固无足取若能舉動之際覩事之未然而知戒亦聖人之所許也㛰媾有言羡文也卦爻中无此義他卦有此一句簡編脫落誤入於此必欲强為之說則鑿矣艮艮下艮上艮其背不獲其身行其庭不見其人无咎翼傳曰艮之繇辭惟曰无咎而已夫无咎非善之至也故夫子於彖辭備言之彖辭則明矣惜乎讀易者未之察也聖人之止非膠而固也事物作於吾前而不為事物之所亂時止則止時行則行行不累吾之止或動或静不失其時動不害吾之静此道之所以光明也今艮之成艮重艮以成也有六位焉上下皆敵應而不相與夫敵應不相與猶人之相背也故曰艮其背艮其背則在我者不獲其身在人者雖行其庭不見其人此所謂不見可欲使心不亂也所貴於聖人者非貴其不見可欲而不亂貴其見可欲而不亂也必不見而不亂有所見則復亂矣故夫艮者惟能艮其背爾非聖人之所謂艮僅免於咎而已彖言艮止也此三畫為艮聖人之事也又言艮其止止其所也此重卦為艮而成六位之不相應也夫既止矣而又止焉止而至於止其所其執一者之謂乎說者不詳其義於艮其背止其所皆大其辭以為聖人之事烏有聖人之止而惟曰无咎者乎學者於易欲得聖人之心當玩味彖辭而後得之盖彖者夫子解一卦之義而小象者夫子解一爻之義讀易不有得於彖象而曰知易者余未之信也彖曰艮止也時止則止時行則行動静不失其時其道光明翼傳曰此聖人之止也止而不止其所是以或止或行或動或静而其道光明也艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也翼傳曰此止其所之止也惟止其所故不能随感而應僅免於咎而已象曰兼山艮君子以思不出其位從程氏初六艮其趾无咎利永貞象曰艮其趾未失正也翼傳曰艮而止其所未免有所囿也故自趾以上循而至於輔皆囿於一體與咸同咸者感也艮者感之息也咸取身之相向艮取身之相背咸以私相應艮止而不應二卦之爻皆非卦之全體其失均也餘從程氏六二艮其腓不拯其随其心不快象曰不拯其随未退聼也翼傳曰艮之三畫其上陽也陽升在上得其所止也其下隂也隂降在下得其所止也惟中爻介乎隂陽之間未可謂得所止者今夫下體之動者趾腓股也腓居股趾之中不能有所拯援其動止皆随乎股趾動止皆随而不在我是以其心不快然二得中得正非一於随人而不知止者故反覆釋之曰不拯其随未退聼也退聼則知随而不知止矣九三艮其限列其夤厲薰心象曰艮其限危薰心也翼傳曰劉子翬曰大學之道貴於能定能静然應心常在也大易之道貴於无私无為然感心不滅也聖人之心固止矣曷嘗无應感之心三與上皆成艮之主也然三之止與上之止異上居卦之終无累於止而能止者三處卦之中上下之際皆交接於我而乃固止其所截然不相應感是謂艮其限列其夤限隔也夤上下之交也隔而列絶之則於事物无所交接故其危薰心也危薰心言不安於心也或謂三既无心於應感何以危薰心也曰人心之天未始亡也孟子謂乍見孺子入井皆有怵惕惻隐之心孺子則痛且懼矣何與于見者而痛懼乎盖萬物一體也同是體故同是心也三雖止而不與物交而其危則實薰心也六四艮其身无咎象曰艮其身止諸躬也翼傳曰居上體之下柔静而止其所也夫位有上下故義有重輕初居下而以柔静自止是以不失其正四居上而亦以隂静自止獨善其身者也是烏足貴哉僅免於咎爾六五艮其輔言有序悔亡象曰艮其輔以中正也翼傳曰艮止其所則五之位為輔也不艮其心而艮其輔所艮已淺矣以不失中故悔亡上九敦艮吉象曰敦艮之吉以厚終也翼傳曰震莫吉於初艮莫吉於上動不謹其始妄動也初謹始也止不謹其終非止也上謹終也震之象為雷雷必動乎下故其主在初艮之象為山山成形乎上故其主在上始終上下之義惟二爻為備漸艮下巽上漸女歸吉利貞翼傳曰由乾坤二爻之交而為男女其位則男下而女上言女必俟男之下交而後歸其歸以漸故曰女歸吉自二爻之交而剛柔皆得正位以是而往可以有功以是而進可以正邦也由二體言之内止而外巽内止則居之而安外巽則不急於進不動則已動則其用不窮也由象以觀之山者木之所生也木之生於山必以其漸也取物以况之鴻之為物也其至必有時而羣必有序亦以其漸也繇辭惟曰女歸吉以其顯者言之也彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也從程氏象曰山上有木漸君子以居賢徳善俗從程氏初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也從程氏六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也翼傳曰二艮體止於中正也漸而止於中正得所止也猶鴻之漸于磐磐石之安平者飲食衎衎能寛裕以自養也五為之應三四間之不能寛裕自養烏能安哉然君子之養非徒為口體之奉故象以不素飽也明之九三鴻漸于陸夫征不復婦孕不育凶利禦㓂象曰夫征不復離羣醜也婦孕不育失其道也利用禦㓂順相保也從程氏六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也從程氏九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也從程氏上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也從程氏歸妹兌下震上歸妹征凶无攸利翼傳曰易言夫婦之道備矣復著歸妹之象何也兊少女震長男也長男居上少女居下以女下男也少女說以動而又先下於男其所歸者妹故以征則凶且无攸利雖征凶而无攸利然天地之大義人之終始在焉古者天子一娶九姓必有為婦媵者所以廣嗣續也惟少女為能成生育之功此在天地之大義人之終始不可廢也餘從程氏彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乘剛也從程氏象曰澤上有雷歸妹君子以永終知敝從程氏初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也翼傳曰陽剛雖非婦人之徳當說以動之時則以剛陽為貴初少女且微而在下以娣媵而歸乃其常也娣媵不能成内助之功雖有其徳如跛者之履耳跛者之履雖不足以有行然亦可以行者以其佐小君而廣嗣續能以吉而相承助也如是而征則為安分故吉九二眇能視利幽人之貞象曰利幽人之貞未變常也翼傳曰二為少女尚在下體亦娣也眇能視與跛能履同皆謂其佐小君而廣嗣續也二居中乃娣之良者然其質剛陽以剛陽而應隂所利在幽人之貞則不變其常矣或曰九二既有其應亦以為娣何也二陽而五隂非夫婦之常理雖應非正故二亦娣六三歸妹以須反歸以娣象曰歸妹以須未當也翼傳曰為兊之主說以媚人其徳非貴也其位不當也其上无應也以是而歸乃須也須賤女也天官書曰織女三星天女也須女四星賤妾之稱知其不可歸能反於下以娣從人庻乎其可也九四歸妹愆期遲歸有時象曰愆期之志有待而行也翼傳曰四有其徳而居上體上體乃女之貴髙者貴髙而无應故為愆期夫有徳而未歸非失其歸也遲歸之志葢有待也物不可以苟合既有婦徳遲歸何傷乎六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也從程氏上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也從程氏豐離下震上豐亨王假之勿憂冝日中彖曰豐大也明以動故豐王假之尚大也勿憂冝日中冝照天下也日中則昃月盈則食天地盈虚與時消息而况於人乎况於鬼神乎翼傳曰豐光大也内明為之體外動為之用明則不蔽動則不息王者冝至此道故曰王假之假至也豐有大義亦有盛義大可尚也盛不可過也故勿憂者宜日之中過中則當憂矣聖人之心廣大如天地光明如日月運行如四時擴而充之故能至於豐至於天地之盈虚日月之昃食四時之消息彼囿於形氣者未有盛而不衰於其盛而處之以不盛斯能終始光大也餘從程氏象曰雷電皆至豐君子以折獄致刑從程氏初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也從程氏六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也翼傳曰二雖為明之主所遇者六五之隂其明无所用故為豐其蔀蔀掩覆也斗君位而夜見日中乃見之自明之暗也夫以明之暗則暗者疑矣二能以由中之信而發其疑疾則二得明其明五亦賴其明而能動明動相須所以為豐五居中尚可發也若上六之暗則不可發矣餘從程氏九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也從程氏九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也翼傳曰初視四為配以下偶上也四視初為夷降上就下也餘從程氏六五來章有慶譽吉象曰六五之吉有慶也從程氏上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶象曰豐其屋天際翔也闚其户閴其无人自蔵也翼傳曰人之一心本自光大惟舍内而務外棄本而逐末所謂光大者始晻昧而􅃜缺矣上以隂柔之資居動之極彼謂處髙亢絶人之地然後為豐而不知髙亢絶人者自滿也自滿以為豐不豐孰甚焉故上之豐其屋乃所以蔀其家豐其屋者冝有以充其中也今乃窺其尸閴其无人幽暗之極至於三嵗无所覩盖務外逐末以為豐者其中索然无有而實无所見也故曰豐其屋天際翔也窺其户閴其无人自藏也當豐其屋之時其揚揚然自為有得謂可以絶人而翔於天際豈知其所謂翔者乃自為閉藏窒塞也歟旅艮下離上旅小亨旅貞吉從程氏􅂏曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉象曰山上有火旅君子以明慎用刑而不留獄翼傳曰止而麗乎外未安其所是以為旅二隂據二五用事之地九三九四上九皆陽也而寓於其間亦旅之義旅一也所以為旅則異也蘇張范蔡之徒奔走列國以求所利者旅也孔孟皇皇欲行吾道以善斯世亦旅也觀旅之得失係其所處如何爾初六旅𤨏𤨏斯其所取災象曰旅𤨏𤨏志窮災也翼傳曰旅以中為貴所謂中者随所處之地而求適其冝也初以旅而處下其所宜者自強今以柔弱處之是𤨏𤨏也𤨏𤨏則見鄙於人其志窮而无立自取災咎也六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也從程氏九三旅焚其次䘮其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義䘮也翼傳曰旅惟二五為吉得中也凡卦皆貴乎中而旅之得中尤吉中安平之地也不及中者卑下也旅而卑下者衆所鄙也如初之𤨏𤨏是也過乎中者髙亢也旅而髙亢者衆所棄也九三與上九是也盖九三下體之髙位上九上體之髙位旅而處髙位當持之以謙抑乃以陽剛處之所處非其道失中也三之失雖不若上之甚然既焚其次又䘮其童僕其傷亦多䘮童僕者以在旅而欲與下也三為艮之主而下有二隂二隂固三之所有也在旅而以髙亢有之下豈為之用哉故其義必䘮也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也翼傳曰未進於中失位而處旅者故曰旅于處資其貨也進居上體得資也斧其器也其質剛陽得斧也有貨有器雖可以治次舍來僮僕然未處安平之地故其心未快也齊魯之君或欲以季孟之間待孔子或欲養孟子以萬鍾孔孟甘心於旅而不就者以處之非其地也六五射雉一矢亡終以譽命象曰終以譽命上逮也翼傳曰五得位不言旅而旅亦非人君之事孔孟之聖賢足以當之雉文明之物也孔孟求時君之所謂文明者以直道取之取之而无獲如亡其一矢爾雖不得其時與位亦必終之以譽命也命猶命世之命以譽歸之之謂孔孟遑遑於天下旅亦甚矣而為萬世之所尊仰射雉雖亡矢譽命不我捨者以上與之也或謂孔孟无一君柄用何以為上與也孔孟所至必聞其政時君致敬盡禮以交之非上與而何上九鳥焚其巢旅人先笑後號咷䘮牛于易凶象曰以旅在上其義焚也䘮牛于易終莫之聞也翼傳曰離為火為牝牛極乎上則火炎故為焚巢過乎剛則不順故為䘮牛飛掦而進輕易也以易而䘮其順其罔聞知之人乎餘從程氏巽巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人象曰随風巽君子以申命行事從程氏初六進退利武人之貞象曰進退志疑也利武人之貞志治也從程氏九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也從程氏九三頻巽吝象曰頻巽之吝志窮也翼傳曰復之三曰頻復巽之三曰頻巽復貴於早三逺於初故曰頻復巽欲不過三亦逺初故曰頻巽二卦皆初爻為主也復如初則知幾至三則失之晚矣巽如初則柔謙至三則失之過矣頻復為厲頻巽為吝吝故其志窮也餘從程氏六四悔亡田獲三品象曰田獲三品有功也從程氏九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也從程氏上九巽在牀下䘮其資斧貞凶象曰巽在牀下上窮也䘮其資斧正乎凶也翼傳曰二以陽居隂而下比上極乎巽而過中皆巽於牀下者巽稱而隐徳之制也終止乎巽而莫有制焉正乎凶者也餘從程氏兊兊下兊上兊亨利貞彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉從程氏象曰麗澤兊君子以朋友講習從程氏初九和兊吉象曰和兊之吉行未疑也九二孚兊吉悔亡象曰孚兊之吉信志也六三來兊凶象曰來兊之凶位不當也翼傳曰成兊之主在三初逺之二比之逺之者不流於說不邇於邪雖與之同體和而不同也其行无所疑比之者其交深其情宻其能悔亡者剛陽而得中也剛陽得中自信必固故曰孚兊吉悔亡悔亡生於吉也信非信於人自信而已故曰信志也三居二剛之上以柔說剛也君子之說人也不媚乎人三之不中正說人而媚之故曰來兊凶易以進為往以反為來三之說二剛有反而就之之意是媚也所以媚者由其所處之不當也九四商兊未寧介疾有喜象曰九四之喜有慶也從程氏九五孚于剥有厲象曰孚于剥位正當也從程氏上六引兊象曰上六引兊未光也翼傳曰三與上皆成兊之主三介於四陽之間二陽在前非其同體而不受其說故來說初與二也來說凶道也上則超然於外不累於物能自以兊逺引者非若三之无所容而求說也然人之貴乎逺引者貴其體剛而才實也柔說而逺引君子以是為未光也兊為口故六爻之辭皆簡而嚴抑以騰口說為戒歟渙坎下巽上渙亨王假有廟利渉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利渉大川乘木有功也從程氏象曰風行水上渙先王以享于帝立廟翼傳曰易言假有廟者二萃與渙也萃聚之時萬物盛多可以致孝享曰假有廟冝也渙者離也離散之時曰王假有廟又曰享帝立廟何也夫物有所底麗則不散有所歸向則不亂王者於離渙之時建國立極而以立廟享帝先之使其勢有所底麗而其心有所歸向合渙之道也故曰王假有廟王乃在中也方其渙也孰為君孰為臣至於有廟則王位乎中而上下定矣萃假有廟萃之所有也渙假有廟渙之所冝也萃渙之時則異其保而治之之道則一也初六用拯馬壯吉象曰初六之吉順也九二渙奔其机悔亡象曰渙奔其机得願也翼傳曰渙之時必剛柔上下相合則不散初柔也在二之下二剛也在初之上柔而在下者必有所賴以為援剛而在上者必有所託以為安故初之得二為壯馬馬壯則可頼以為援二之就初為奔机得机則可藉以為安豪傑之士奮於潰散四出之中必得其下託以為資而在下者亦必賴豪傑為能拯巳也此初之從二為順於理而二之就初為得所願也六三渙其躬无悔象曰渙其躬志在外也翼傳曰二五皆无其應亦渙也夫无其應者鳥能合渙哉故二必合初五必合四四與初亦无其應其勢必合合則必専若三與上情則合也位則應也然二者皆非得位之地也居不得位且逺而不比故三之志雖在於外徒渙其躬而已渙其躬而不交於合渙者可以免悔非可相與有為也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也九五渙汗其大號渙王居无咎象曰王居无咎正位也翼傳曰初與二合於下其合渙之功小四與五合於上其合渙之功大彖曰柔得位乎外而上同葢言四也四正而順五中而尊其情比其交宻其徳皆巽當渙散之時君臣相與如此冝其有成功也四竭其力五享其成竭力者勞享成者逸故四渙其羣元吉羣聚也謂於渙之時能成群聚斯民之功則元吉也又曰渙有丘丘聚之大者在上而髙謂五也四能下聚其民上得其君使萬民聚于下君臣聚于上此合渙之大者四之任如是之重故所憂愈深夷平也所思未平若伊傅之自任以天下之重者是以其道大光也四任此責五何為哉曰渙汗其大號而已疾平而氣通則汗焉體之所以寧也亂解而情通則號焉王之所以居正也已亂如是可以免咎彖既言其義爻復大其美合渙之功其在四五乎上九渙其血去逖出无咎象曰渙其血逺害也從程氏節兊下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民翼傳曰澤之於水也虚則納之盈則洩之其容也有節節之象也坎陽居上兊隂居下剛柔分也其位則二五皆剛剛而得中節之義也節則能亨故曰節亨為禮而儉居䘮而戚禮之本也聖人則曰寜儉寜戚苦節不可正非可傳可繼之道也說以行險言卦才也當位以節言五為節之主也有是才居是位用中正以節則通行而无弊六爻惟四五為亨且吉中正也他爻不中不正随其得失而著吉凶之義焉象曰澤上有水節君子以制數度議徳行從程氏初九不出户庭无咎象曰不出户庭知通塞也翼傳曰有應在四通也陽居其前塞也不出户庭以安之則是知通塞之宜而可以无咎也九二不出門庭凶象曰不出門庭凶失時極也翼傳曰二異乎初矣三四皆柔柔則雖在前而不我拒此其為時可出而有行也獨節止焉不應乎五失時之中凶道也半門曰户二户曰門户庭小也猶可不出門庭大也不出則凶六三不節若則嗟若无咎象曰不節之嗟又誰咎也翼傳曰進乗二陽處澤之溢過乎中而不節者三也知其不節而能傷嗟以自悔其誰咎之哉下體之極極則當變故發此義六四安節亨象曰安節之亨承上道也翼傳曰陽實而其用常餘隂虚而其用常乏陽以施諸人為節隂以取諸人為節四以隂柔處於下而上承九五之陽此安於節而得承上之道故能亨也凡所居不正而強有取焉皆非安矣不安者必不能常也九五甘節吉往有尚象曰甘節之吉居位中也從程氏上六苦節貞凶悔亡象曰苦節貞凶其道窮也從程氏中孚兊下巽上中孚豚魚吉利渉大川利貞從程氏彖曰中孚柔在内而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利渉大川乘木舟虚也中孚以利貞乃應乎天也翼傳曰張横渠曰上以巽施之下以恱承之其中必有感化而出者焉孚者覆乳之象也夫覆乳者必剛外而柔内雖柔内非陽則不生故剛得中而為孚也餘從程氏象曰澤上有風中孚君子以議獄緩死從程氏初九虞吉有它不燕象曰初九虞吉志未變也翼傳曰有諸己之謂信信非信於人自信也初信之始信未孚也未孚則當自反而求諸己故貴乎自虞也虞度也慮也當其志未變之時能慮度其在我者可信與否而後交乎人故吉遺内而務外捨已而求人有它也有它則皇皇然靡有定向何休裕之有哉燕休裕也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也翼傳曰二獨无其應无應若未信於人而爻之最吉莫二若也自耀者其實䘮自晦者其徳章无心於感物而物无不感者至誠之道也二以剛履柔其居得中且伏於二隂之下葢静晦而无求者无求而物自應故鶴鳴在隂而其子和之者感以天也人之有好爵者皆欲靡係之我无所求而人求我也至此无幽顯逺近之閒皆在所感之中矣繫辭以言行明之姑舉其一端也六三得敵或鼓或罷或泣或歌象曰或鼔或罷位不當也翼傳曰三不中正履非其位為成兊之主兊說也不中正而用說於其上上髙亢而不下交故三不自信而失其故常凡與之遇者皆若仇敵然始鼓而張之或罷而廢之始悲而泣或喜而歌志操靡定随事遷徙其類於䘮心失靈者歟六四月幾望馬匹亡无咎象曰馬匹亡絶類上也翼傳曰君子雖信乎已而不信乎人然亦未甞自居可疑之地者内外欲其交孚也自信其非盗而必夜行自信其非滛而必冶容識者不為何也夫外亦足以疑内也四居正而巽體非无信也然處至盛之位而廹近於五如月之幾望將敵乎陽其所當戒者立黨以為助也四有應在初必如兩馬亡其匹類而惟上之從則取信而无咎此為處盛位者而設戒仁矣哉九五有孚攣如无咎象曰有孚攣如位正當也翼傳曰二之孚在内五之孚在外二以陽居隂明而處之以晦也五以陽居陽明而處之以明也中孚貴内而不貴外貴晦而不貴明五之孚不逮乎二逺矣然五正當君位烏可不以信而結乎民攣固結也固結異于感也商人作誓民始畔周人作㑹民始疑不有所感而固結之五之孚止於无咎而已上九翰音登于天貞凶象曰翰音登于天何可長也翼傳曰信貴務内乃處乎外信貴在中乃極乎上巽風也以陽居之盖以飛求顯以鳴求應者實既䘮矣烏能久哉貞固守此凶之道也小過艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉從程氏彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不冝上冝下大吉上逆而下順也翼傳曰大過四陽小過四隂陽為大隂為小陽為君子隂為小人大過大者之過也大者過則必亢故以比應乎隂為吉小過小者之過也小者過常則取禍故以不冝上冝下為吉曰小過亨小事有順時而當過者自有亨之道也然雖當過小者得位烏可使之太過哉如飛鳥遺其音音雖在上鳥不可随聲而愈上愈上則愈窮矣何者上逆而下順也譬之小者之過矯之則已過而不已何異鳥之上而窮乎彼有不度徳不量力而欲為過常之事卒於顛越者皆不知逆順之理也象曰山上有雷小過君子以行過乎恭䘮過乎哀用過乎儉翼傳曰雷出乎地而震乎天山非有雷之所雷之所過而已雷過乎山而不留猶小過之不可留於過也行過乎恭䘮過乎哀用過乎儉其過未甚失也然已逺於中矣故君子以為小過也初六飛鳥以凶象曰飛鳥以凶不可如何也翼傳曰當隂過之時初之隂必不安於其下其過而趨上如鳥之奮迅然勢必取凶莫如之何也六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也翼傳曰隂居二五隂得位也陽居三四陽失位也二雖在二陽之下以陽之失位而不與之遇六五居中為隂之主二之所欲從者故過其祖而遇其妣祖言陽妣言隂也然二之遇五也以臣道遇之則可恃隂之過而欲為過常之事陵勢犯分等夷其君則凶咎甚矣故曰不及其君臣不可過也二中且正故能不及其君苟非中正必有不臣之過矣九三弗過防之從或戕之凶象曰從或戕之凶如何也九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也翼傳曰二陽皆失位者而三之所居乃在二隂之上當隂之過隂欲上趨三據其上而拒之此豈三之所安哉其所當過者過於防二隂也弗過防之則二隂從而戕之矣戕之則其凶无如之何也若四則安於二隂之下二隂已趨於上而无害陽之心故无咎所以无咎弗過乎隂而遇乎隂也隂方用事吾乃與之遇其往也亦危當有戒備之心可也非獨當戒備也與之遇而即過之可也用吾道而為永貞彼小人烏可與之久處哉故曰往厲必戒終不可長也六五宻雲不雨自我西郊公弋取彼在穴象曰宻雲不雨已上也翼傳曰五隂之主也隂不得陽不能有所為故雖宻雲而不雨夫小人之用事必挾君子以行其志然實忌君子而名則用之公山弗擾佛肸南子之徒亦欲召夫子以為欺是也五當隂過之時陽伏於下而不為之用五以不能雨也乃欲弋取之弋有劫而致之之心陽既安於失位豈能為五所致故曰彼在穴謂深潜而不出也陽不出隂已上也隂已上陽不與之交故不雨也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也翼傳曰愈上而愈不遇故其凶愈甚也既濟離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之翼傳曰既濟之時皆有安之之心惟静而不擾者為能守之下體柔得中守之以静是以初吉然静不可止也止則蠧弊生而終亂矣聖人通其變使民不倦欲其不止也卦有是義而其才則下離而上坎離明也柔中之徳也坎險也剛陷於中也其始則守以柔中之徳其終則剛陷於中其才如是故初吉終亂之義生焉初九曳其輪濡其尾无咎象曰曳其輪義无咎也翼傳曰既濟之始以安静為貴初之剛陽不可過於有為也曳其輪而不前濡其尾而不濟於義則无咎矣六二婦䘮其茀勿逐七日得象曰七日得以中道也翼傳曰二之隂柔婦也離體文明茀也茀者首飾文明之物也既濟之時二以文明與五相應若汲汲然以其文明之徳而求為粉飾太平之事人方樂於安静必不我從此賈誼欲改制度於文帝之時終不得行其志也惟自晦其文明勿逐逐以求其上則七日必得矣七日者以卦有六位七則變也一變則吾志行矣何者天下之理由文以趨質則難由質以趨文則易二之得中非過於文者既濟之久安得不趨於二之文也周公相武王於定商之後止於反商政而已而制禮作樂以文太平乃在成王之時始之䘮其茀勿逐而終必得也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也翼傳曰以剛居陽處欲變之位剛陽則過於有為欲變則動而之外其視在内之事已濟必欲用剛陽而求功於外也故為之戒曰以髙宗之盛而伐鬼方猶三年然後克之其可用小人而啓多事之原乎无事之世捨内治而幸邉功者皆小人倡之也六四繻有衣袽終日戒象曰終日戒有所疑也翼傳曰居坎之底而其體虚乃舟之漏者當戒也餘從程氏九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也翼傳曰東鄰謂坎其位鄰於東也西鄰謂離其位鄰於西也二為離之主而位乎下五為坎之主而位乎上既濟之初吉言二也二之柔静當既濟之始能安於濟者故不盡飾而用禴祭五之陽剛當既濟之終時泰而心侈物備而意廣欲儌意外之福故至於殺牛以祭殺牛以祭禮則盛矣終不若禴祭之實受其福何者治莫大於守成福莫長於无禍始之安静守成也以无所事為福乃福之至也終之盛祭求福也既濟而求福福不可益徒為是紛紛爾文帝俾祠官致敬毋有所祈而海内享富庻之樂武帝侈大多欲雖東封西祀何甞有分毫之補哉此二五之别也上六濡其首厲象曰濡其首厲何可乆也翼傳曰既濟之終終則當變而又以隂柔處之烏能乆哉坎為水故取濡首之義餘從程氏未濟坎下離上未濟亨小狐汔濟濡其尾无攸利從程氏彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也從程氏象曰火在水上未濟君子以慎辨物居方從程氏初六濡其尾吝象曰濡其尾亦不知極也從程氏九二曳其輪貞吉象曰九二貞吉中以行正也從程氏六三未濟征凶利渉大川象曰未濟征凶位不當也從程氏九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也翼傳曰既濟初吉終亂未濟則初亂終吉何以知其然也以卦之體言之既濟則出明而之險未濟則出險而之明以卦之義言之濟於始者必亂於終亂於始者必濟於終天之道物之理固然也作易者於既濟之三則以髙宗伐鬼方為戒於未濟之四則以伐鬼方為功既濟欲其安於濟也三妄動以求功必入於險故預戒之未濟欲其濟難也四動而求功能出於險故美之用師以求濟必正而吉其悔乃亡悔亡則四之志行矣三年而後賞于大國言必如是之勞乃可濟也居明之始其才剛陽初出於險而上比於五故未濟之責惟四獨任之六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也從程氏上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也翼傳曰未濟易之終上九未濟之終生生不窮之理在是故上九不言事之濟與否而以人之安於天者言之夫亂者治之基治者亂所伏未濟之極豈終於不濟哉以上九之才雖處无位之地信其終之必濟也故曰有孚于飲酒孚者信也飲酒者樂而安之之謂也然樂而安之者非肆吾意而无所事也循理守正静以處之以俟天理之至而行吾志焉若以宴安逸豫為樂天之事是廢人而任天於有孚之道失其是矣不逆天而有為不任天而自逸无一非天也易始於天而終之以天理中庸始於天命而終之以无聲无臭始始終終皆天也君子所當盡心焉易翼傳下經下
