body:
  text: 易翼傳上經上宋鄭汝諧撰乾乾下乾上乾元亨利貞翼傳曰易始於天地而曰乾坤天地其位也乾坤其義也曰天地則渉於有形曰乾坤則知天地之所以為天地矣繫辭曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣乾坤果何物也道無乎不在乾坤亦無乎不在一物一事具一乾坤近取諸身乾坤在焉一動乾也一息坤也一嘘乾也一吸坤也動息嘘吸相因相生未始間斷此乾坤之所以為乾坤而易之所以為易也故曰天地設位而易行乎其中矣易非獨謂此書也通上下亘古今無終始無前後而是理未嘗息是之謂易能悟此理則易無餘藴矣餘從程氏初九濳龍勿用翼傳曰陽九隂六說者不一或者取河圖為證謂六為純隂過六則一陽生矣夫以六為純隂可也以九為純陽則不可蓋河圖以九位乎離至離而一隂已生矣然則九六之義安在乎曰說卦固言之矣而學者弗之攷也曰昔者聖人之作易也幽賛於神明而生蓍參天两地而倚數參天两地非九六乎數始於一而至於五備矣自五以往皆配合以成者故一得五而成六二得五而成七三得五而成八四得五而成九五五偶而成十河圖之中宫以五位焉所以管攝是數也聖人於五數之中而用一三五之竒數為九參天也用二四之偶數為六两地也五散而為九六而九六固已行乎五之中矣此自然之理而說卦之所言也學者多其說以求之亦過矣九二見龍在田利見大人翼傳曰龍濳則在淵飛則在天二曰見龍在田田豈龍之所安處哉二居下體之中君徳也五居上體之中君位也君徳著聞而天下利見聖人非敢以是自安也故曰見龍在田時舍也時舍者非久安之地也不言吉凶悔吝者在徳則為正中在天下則為文明其事則吉其心則非所安也耕者歸舜則去之而漁漁者歸之則去之而陶懼名之我歸畏天下之我從也書曰𤣥徳升聞乃命以位𤣥幽濳也舜之本心也升聞見龍也舜之不得已也此理至微故以在田為言九三君子終日乾乾夕惕若厲无咎翼傳曰三居下體之上過乎中也不曰龍而曰君子龍非可以常健也能飛能蟄是以變化不測三陽位之不中者而以九居之蓋乾而又乾龍无此義也惟君子用之以進修不懈日夕惕懼則雖危而无咎九四或躍在淵无咎翼傳曰重剛而不中三與四同也三之无咎其辭詳而危四之无咎其辭簡而平三下體而未離乎下乾道之未革也其進退之際得失甚重故必終日乾乾夕而惕若然後无咎四上體而已趨於上乾道之已革也既進而無退處得而鮮失惟擇其所安者而從之則可以无咎王弼曰凡言无咎者本有咎也防得其道則无咎餘從程氏九五飛龍在天利見大人翼傳曰五進乎天位不知其然而然者聖人之心豈利天下而為之固天下之所利見也餘從程氏上九亢龍有悔從程氏用九見羣龍无首吉翼傳曰六十四卦之九六其用如是莫大於乾坤爾見識也識得羣龍之義惟无首則吉也以龍徳為首則是先天下而起也聖人之起應之也非先也彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧翼傳曰彖辭疑有差互當云大哉乾元萬物資始乃統天雲行雨施品物流形乾道變化各正性命保合太和乃利貞大明終始六位時成時乘六龍以御天首出庶物萬國咸寧乾之元無對故曰大哉天以形言元以道言故統天者元也萬物資始始未見其形也元統天而雲行雨施然後品物流形物既有形必乾道之變化斯各正其性命隂陽之相生無窮變化也萬物之性命保合沖氣之和是以利且貞利者各得其宜貞者皆正於一物自始而亨至於利且貞乾之性情見矣大明天道之終始斯見六爻之位各以時成謂自初至上皆有時也六爻之時即天時也各因其時以乘六龍或潛或見或飛或躍皆所以御天也御之為言若曰天之道惟我所用也此皆聖人體天之事故終之以首出庶物萬國咸寧餘從程氏象曰天行健君子以自强不息從程氏濳龍勿用陽在下也見龍在田徳施普也終日乾乾反復道也或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可久也用九天徳不可為首也翼傳曰此一叚總言六爻之時義三在下體勢将趨上故反復必合於道也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞翼傳曰元亨利貞萬物所以終始推乾之道而施之於人元者首天下之善无不統也亨者㑹天下之嘉通於理也利者和天下之義合於公也貞者集天下之事正於一也事正於一然後無窮者出焉餘從程氏初九曰濳龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可㧞濳龍也翼傳曰自此以下詳解六爻之時義濳者志於濳而已豈有徇物成名之心樂則行之常樂也憂則違之不憂也專求吾志而已不願乎其外也是心浩然與天地同其大何嘗有隱顯之間舜之飯糗茹草也若將終身者此也九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也翼傳曰庸常也非謂於言行常謹信也亦非謂於其常常者當謹信也蓋以是為飢食渴飲之常爾閑邪而誠自存善世而不自伐誠則形形則著著則君徳章而文明見矣正其位而君徳章且為天下之利見聖人之心何如哉九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣翼傳曰三之位危矣惟忠信可以進徳惟修辭立誠可以居業所自處若是變動之際與時偕行将至上體知至也居下體之終知終也至則至之見幾而作也終則終之惟義所在也以是居上心未嘗驕以是居下心未嘗憂驕憂之心可忘而乾乾夕惕之心則不可忘也餘從程氏九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎翼傳曰四乾道之革也非期於必革時然而然耳聖人之隨時猶晝作而夜息飢食而渴飲无適而非道也四已進而在上故亦言進徳修業三之修業居業也四之修業成業也至此而不修業不足語變化矣詩曰文王陟降在帝左右及時之謂也餘從程氏九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也從程氏上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也翼傳曰過中則亢非謂居髙者必至於亢也以亢為言有此義也濳龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也翼傳曰此言用九以應天下故曰乾元用九天下治也濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則翼傳曰此言用九以合天道故曰乾元用九乃見天則九五聖人之成徳大而能化者不曰位乎君位而曰位乎天徳有其位而无其徳非乾之大人也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉翼傳曰自此以下至卦終亦言用九之義故不嫌於詳複貞性也利情也利者行其所无事貞者實也情乃發出性中之實理也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也翼傳曰乾之徳剛健而曰中正純粹坤之徳柔順而曰徳方又曰其動也剛天下之理未有倚於一偏者故剛健而不中正純粹是以剛徳為天下先失其所以為剛健矣六爻之所發揮通此情也時乘六龍以御天御此道也雲之行雨之施皆剛陽不至於驕亢故能調暢萬物而天下和平此皆用九之義宜深體之君子以成徳為行日可見之行也濳之為言也隠而未見行而未成是以君子弗用也君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎翼傳曰以三畫而分三才則三之位純繋乎人事不可不乾乾而夕惕若四言中不在人蓋嚮乎天矣特未中也或曰聖人亦有不中者乎聖人之徳无不中也時與位之不中聖人之所兢兢也觀文王周公之危疑則可見其時與位非可以優劣言所遇者如此爾夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎翼傳曰其唯聖人乎二一句羨文也餘從程氏坤坤下坤上坤元亨利牝馬之貞君子有攸徃從程氏先迷後得主利西南得朋東北喪朋安貞吉翼傳曰陽動而隂靜陽明而隂晦靜晦而居先則必迷後而得所主則利曰安貞吉吉生於安且貞也以隂從陽不安且貞其能吉乎餘從程氏彖曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地无疆從程氏象曰地勢坤君子以厚徳載物從程氏初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也從程氏六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也翼傳曰坤隂卦也二隂爻也以六居二以隂居隂也是皆隂柔之極何為以直方大繫之惟天下之至靜為能動惟天下之至柔為能剛惟天下之至晦為能明其體重厚其質柔靜其位中正直方大蓋二得之於所性成之於所飬者故曰六二之動直以方也動者二之發見處也其所性所養自然發見非勉而習之是以无不利得乎大然後有其光有其光斯可以名其大故又曰地道光也六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也翼傳曰坤純隂也惟三與五為陽位三曰含章五曰文在中謂其以隂柔靜順而中藴陽明之美詳見六五解餘從程氏六四括囊无咎无譽象曰括囊无咎愼不害也翼傳曰坤純隂之卦也以六居四隂而又隂也上遇六五五亦隂也隂晦如是乃閉塞之時也處之之道惟當藏宻而不發露不量可否輕出而用之雖小有譽而咎亦隨至矣或曰二亦以隂居隂何以吉也二下體也得中也二與四異矣學者當自識之六五黄裳元吉象曰黄裳元吉文在中也翼傳曰自有易以來惟黄裳之義未有知之者其失在以裳為下也何以知裳非下也考小象文言之辭而知之也象曰黄裳元吉文在中也文言曰君子黄中通理正位居體美在其中而暢於四支是皆以黄為中以裳為文為美无取於在下之義蓋古之服制十二章衣用繪裳用繡考工記謂五采備謂之繡裳備五采與衣之繪不同故裳為至美為至文是以六五取象焉六五稱中美元吉何也坤體厚重隂爻虚靜而五位焉五陽明而中正也以厚重虚靜之資而藴陽明中正之徳所謂充實之謂美充實而有光輝之謂大故能暢於四支而發於事業大吉大善无加於此三曰含章五曰黄裳章之色不若繡之備三雖陽不若五之盛三不得中五尊而得中也他卦六三則為不中不正六五則為暗為弱惟坤則為章為美必有黙識之者上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也翼傳曰剥之極稱碩果坤之極稱龍明是理未嘗息也剥則上九獨存故不食坤則陽去其位而復反故未免於戰用六利永貞象曰用六永貞以大終也翼傳曰隂視陽為小惟永乆貞固則能以大終也以大終所以能承乾此用六之道也文言曰坤至柔而動也剛至靜而徳方後得主而有常含萬物而化光坤道其順乎承天而時行翼傳曰乾曰中正純粹坤曰剛方此所以為乾坤之徳之用也餘從程氏積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也翼傳曰自此以下又廣前意惟乾坤六爻反覆推明之直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也從程氏隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽蓋言謹也從程氏君子黄中通理正位居體美在其中而暢於四支發於事業美之至也翼傳曰凡於理不通者以其倚於一偏也惟黄中則不偏以之察理无理不通何謂位何謂體坤土也五土數也五行為土五色為黄五聲為宫五事為思五方為中河圖以五位於中央而為數之管攝以其无所不通也今以坤土而位乎五是以正位而居正體君子以是理而發於事業是為美之至也隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄翼傳曰隂極於亥亥乾位焉以龍表之使知有陽也然陽之始生隂之所疑也疑則不受夫陽未免於戰戰乎乾猶未離乎隂之類故俱傷也堅冰之漸君子謹之隂盛而戰寧免於傷著其禍所以警之也屯震下坎上屯元亨利貞勿用有攸往利建侯從程氏彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧翼傳曰易始於畫畫始於乾坤自乾坤而為八卦乾坤之變極矣自八卦而為六十四八卦之變極矣八卦皆乾坤所生六十四卦皆八卦所生此作易之本㫖也傳易者懼其說之簡易而无以自託於艱深之地於是為互體變卦之說震坎相合中復有艮離震相合中復有巽此互體也自復來者若干卦自臨來者若干卦自泰來者若干卦此生於師小過生於晉之𩔖此卦變也又曰乾坤大父母也復姤小父母也嗚呼天地萬物之父母故萬物一天地也震坎相交既成屯矣安得復有艮離震相交旣成噬嗑矣安得復有巽卦之一陽者謂自復來二陽者謂自臨來三陽者謂自泰來隂陽皆始於乾坤捨曰乾坤而曰來自復自臨自泰者何耶錯震於坤之下則為復錯巽於乾之下則為姤復一陽姤一隂八卦相錯必有是也今見其為一陽一隂之始則又目之曰小父母父母一也安得小大之别也枝蔓其辭轉相傳致學者不知其非也捨道徳性命之理而從事於紛紛无補之說安能見大易之藴哉昔人論卦謂兩兩相對以成此說得之畫有隂陽變之所由生也六十四卦皆隂陽相對以變屯與蒙相對皆二陽也屯變初與五蒙變二與上也需與訟相對皆二隂也需變上體訟變下體也師與比相對皆一陽也師變二比變五也小畜與履相對皆一隂也小畜變四履變三也六十四卦其變皆然蓋天下之理生於一成於兩未有獨立而无對者消息盈虛徃來屈伸動靜闔闢其相與推盪於无窮者皆兩也乾坤之後即繼以屯屯之彖曰剛柔始交而難生乾純陽坤純隂震始交乎下坎始交乎中也他卦或曰柔來文剛剛來文柔皆以乾坤為本而取剛柔之變相錯以成卦非諸儒之所謂互體卦變也此理甚明當有能辯之者象曰雲雷屯君子以經綸翼傳曰言居屯之時則勿用有攸徃有濟屯之才則君子以經綸義各有在也餘從程氏初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也翼傳曰屯繼乾坤之後九居屯爻之初濟屯之責在乎初也磐者其居安也元者其立壮也隆厚基本而不輕其動所以行吾正也在下而行正非可以无助也故利建侯陽貴也隂賤也居三隂之下以貴下賤也位雖未貴而徳則貴矣民捨此安歸乎六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也從程氏六三即鹿无虞惟入于林中君子幾不如舍往吝象曰即鹿无虞以從禽也君子舍之往吝窮也翼傳曰處動之極即鹿也不得乎初與五即鹿而无虞也然有知幾而舍之義何也動之極也動極者必變也餘從程氏六四乘馬班如求㛰媾往吉无不利象曰求而往明也翼傳曰四近於五而五陷於屯初之得民乃四之㛰媾四求初而往濟於五則事上之義明不求之而往乃私與初應豈不處闇昧可疑之地乎故曰求而往明也餘從程氏九五屯其膏小貞吉大貞凶象曰屯其膏施未光也翼傳曰初與五皆剛陽也初位乎下乃大得民五位乎上乃屯其膏何也草昧之時必有奮乎下者初為動之主勢必上行此民之所歸也五坎體也坎者陽陷也居屯而有所陷徒擁其位爾故其施艱蹇可以小貞不可以大貞坎為雲為雨故曰膏曰施也昔者漢唐創業之君相提擕於百戰之中是以能卒成大業其繼承者則不然艱難奪於富貴志氣墮於嗜慾一有所陷雖有扶衰撥亂之才之志顧未有大能濟者故曰神堯以一旅取天下後世子孫不能以天下取河北此初與五之别上六乘馬班如泣血漣如象曰泣血漣如何可長也從程氏蒙坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三凟凟則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也翼傳曰蒙穉也昧也穉而昧者未能遽亨所以亨者在二也剛而得中二之亨也用我之亨以行發蒙之時中故曰以亨行時中也匪我求童蒙童蒙求我非吝於發蒙也葢彼能求我則可以迎其欲發之心而乘其可發之機有如時雨化之者若未反三隅而再三瀆則在彼之蒙猶未可發而再三告之者亦瀆之也彼此俱瀆則蒙不知所趨无益於蒙也唯時中之君子則知此理餘從程氏蒙以飬正聖功也翼傳曰大人者不失其赤子之心也赤子之心萬善皆備特蒙而未覺爾養有二義自養也養人也自養者當以蒙而養其正養人者當於蒙而養之以正此皆作聖之功用故曰聖功也象曰山下出泉蒙君子以果行育徳翼傳曰讀大象者當先觀彖不觀彖則不識名卦之義蓋合二卦以成名有取象者有取義者有取畫者天地水火山澤風雷八卦之象也健順明險動止說入八卦之義也以竒偶分剛柔八卦之畫也如彖言明出地上晉明入地中明夷雷雨作解其辭與大象同者皆以象名而以義兼之也至言險在前為需險而健為訟行險而順為師若此類專以義名也柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有若此類專以畫名也釋經者不觀諸彖惟泥大象之言如天下有山遯乃於天山取遯之義風自火出家人乃於風火取家人之義蓋大象專取象以繋卦至於成卦之名不止在是欲識名卦之義求之於彖足矣泥大象而曲為之說者蓋不深考也果行育徳有本者如是亦可於山下出泉見之初六發蒙利用刑人用說桎梏以徃吝象曰利用刑人以正法也從程氏九二包蒙吉納婦吉子克家象曰子克家剛柔接也從程氏六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也翼傳曰時之屯者急於得所依惟屯之二中正自守故雖乘剛而十年不字人之蒙者昧而无所擇蒙之三不中正故見金夫而不有躬嗚呼見利不動臨難不變非中正者其誰與歸二爻皆以女為言女子多欲者也餘從程氏六四困蒙吝象曰困蒙之吝獨逺實也從程氏六五童蒙吉象曰童蒙之吉順以巽也翼傳曰童蒙非冥然无知之謂如赤子之心特蒙覆於其中而未發爾目之不明以有翳也翳去而明自見若无根之目雖黄帝豈能予之以其明哉伊尹能覺太甲不能覺昏迷之夏桀周公能覺成王不能覺逆亂之管蔡以六居五中有陽也巽順以應二資於明也其蒙如童能愿而信發之則覺所以吉也上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也翼傳曰處一卦之上而為下所仰與二同為剛陽是亦任治蒙之責者然二以剛居柔虚心善應故為包蒙上九極乎剛而過乎中非包蒙乃擊蒙也治蒙亦有時乎用擊然用擊豈君子之得已哉惟以之禦冦則上下之所順也需乾下坎上需有孚光亨貞吉利渉大川翼傳曰需有待也在我者有可需之才在上者有可需之君二者交相致焉斯可言需矣必如傅說然後可需於版築必如太公然後可需於渭濱雖然傅說无高宗徒需也太公无文王徒需也需之成卦乾陽在下有可需之才也九五位乎天位有可需之君也有是二者可以自信故曰有孚需之於始其終必遇故曰光亨上下相得以徳而合故曰正吉成大功立大事无適不可故曰利渉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也翼傳曰五雖為坎之主然處中而尊其剛陽之徳同乎乾也徳同則乾恃五而進五陷乎險亦援乾以進非特乾需乎險五亦需乎乾矣五在險中人見其或陷也剛陽在下以類而至則有不陷之義存焉故曰其義不困窮矣象曰雲上於天需君子以飲食宴樂翼傳曰雲上於天霈而為澤可須也故飲食宴樂居易以俟之易言寛裕自養皆以酒食言說者乃謂雲上於天蒸潤萬物故需有飲食之象此泥於序卦之說竊有疑焉初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也翼傳曰需者乾見險而須也初最逺而為郊郊未有水故不犯難二漸近而為沙沙濵於水矣故小有言三已逼而為泥泥則汚我矣故致冦至坎為水故取水義餘從程氏九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也從程氏九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也從程氏六四需于血出自穴象曰需于血順以聽也翼傳曰四以險而當乾陽之進故傷而血也五與乾陽同徳而受其進四必不能與乾為敵故出自穴以避之穴所安之位也能去其所安之位者由其以柔順而退聽也九五需于酒食貞吉象曰酒食貞吉以中正也翼傳曰五雖在險中以陽徳而居中正之位且有同徳之陽以類而進五何所憂哉惟需於酒食寛裕以自養爾以是而處需是為貞吉上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也翼傳曰四當乾陽之並進故出自穴去其所安之位也乾陽歴四而逹於五陽已亨而无所競矣上以敬受之故入於穴得其所安之位也需者未定之事終則定而无所需故上獨不言需也餘從程氏訟坎下乾上訟有孚窒惕中吉終凶利見大人不利渉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利渉大川入于淵也翼傳曰訟之為訟其義在坎健而不險安能成訟坎之為險其義在二卦本坤體二來居中化順成險故坎之三爻惟初與三皆以柔從剛以下從上惟二剛而无應窒於其間窒生訟訟故惕雖窒惕也然二剛而得中有孚之象也有孚而中則不極於訟有吉義焉需訟皆因坎而生坎水也故皆曰渉大川需則利渉而訟不利渉者乾可上也不可下也險可出也不可入也需之險在前健進則出乎險故曰光亨正吉訟之險在下健來則䧟於險故曰入于淵也餘從程氏象曰天與水違行訟君子以作事謀始從程氏初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也從程氏九二不克訟歸而逋其邑人三百户无眚象曰不克訟歸逋竄也自下訟上患至掇也翼傳曰易雖不可為典要而成卦各有所主由所主而觀之其脉縷可坐析也所以訟者二實為之初與三雖同居險體蓋附之也是以初與三有終吉之義而以訟之必不勝者寓於二焉邑人三百户言下體之三爻也二來居中化三爻而為險據而有之以為邑人欲以是與乾訟也夫乾上也坎下也以下而訟上其患若掇拾而取之爾若知其義之不能訟捨同體之險而逃竄之則可以无𤯝矣眚災也非怙終也二剛而得中其過不甚能逋竄則𤯝災亡矣六三食舊徳貞厲終吉或從王事无成象曰食舊徳從上吉也翼傳曰勢均則訟力弱則從二與五訟以剛遇剛也六三以一柔而居三剛之下惟當以下從上以柔從剛故不言訟食舊徳從王事皆從之之事也舊素也素有徳於我者當食之謂上九之正應也若遇三陽不擇其所從則不得其正矣正則雖處危而亦无咎也凡成事者陽也隂則應之而已此極言柔從剛下從上之理所以免於訟也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也翼傳曰四雖健體所居柔也所履所應亦柔也初為正應而二據之非理也四知其不能訟惟自反而就於理則其訟自變而歸於安且貞矣復反也即就也命理也渝變也世之極于爭者其失以不反於理也若四之所處其何失之有九五訟元吉象曰訟元吉以中正也翼傳曰旣曰訟矣安能元吉所以為元吉者蓋所居中正可以息天下之訟也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也翼傳曰上九剛過而不得中健極而終於訟居上而下莫與之校三其正應乃順乎已而不訟者故取訟勝為義訟之勝必有所獲故或有錫之以鞶帶者說文曰鞶大帶也又曰鞶或以為首餙則鞶者服之華而在上者也上九訟而有得自以為華其居在上若鞶之在首也然以訟而得之則得者隨失而榮者所以階辱也終朝三褫之若曰不旋踵而奪之者踵至矣何足敬哉師坎下坤上師貞丈人吉无咎從程氏彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆從程氏初六師出以律否臧凶象曰師出以律失律凶也從程氏九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也從程氏六三師或輿尸凶象曰師或輿尸大无功也從程氏六四師左次无咎象曰左次无咎未失常也翼傳曰二既帥師矣四雖比於五而其才隂柔惟次於左則得其常而可以无咎左不用之地也餘從程氏六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子師師以中行也弟子輿尸使不當也翼傳曰以柔弱而為用師之主非憂其暴也憂其不斷也禽為田害當奉辭以伐之害而不討有咎也長子帥師則所任必專又使弟子衆主之凶之道也柔者或失之不斷故以是告之餘從程氏上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也從程氏比坤下坎上比吉原筮元永貞无咎不寧方來後夫凶從程氏彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯翼傳曰人之情附近則相比夫附近而相比未必非苟合是乃比之所惡也故曰比吉又曰原筮元永貞无咎羣隂固相附近然不可比也何也非元也非可永正也必推原占决求其可比者而比之孰為可比者其惟五歟五剛中居尊雖不相附近者亦當求比也不寧言羣隂也隂不能自安比五則安也夫指卦之剛陽而言也後字去音謂後其夫而不比則凶也初六有孚比之无咎有孚盈缶終來有他吉象曰比之初六有他吉也翼傳曰五為比之主初最逺而非其應何以有吉義蓋幾生於應物之先而誠出於其志之未變故可以信求比何咎之有盈充也缶素器而无文也居下而位卑其文固未著矣擴吾之信以充之五雖逺而非應終必來應而有他吉矣有他吉者非期於必得而得之也傅說之於高宗太公之於文王若无自而能比終於必比者誠使之然也六二比之自内貞吉象曰比之自内不自失也從程氏六三比之匪人象曰比之匪人不亦傷乎翼傳曰未能近於五而所比者二隂比之非其人也安得而不傷二亦處重隂而貞吉何也二中正也應乎五也六四外比之貞吉象曰外比於賢以從上也從程氏九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也從程氏上六比之无首凶象曰比之无首无所終也翼傳曰彖言比輔也下順從也下皆順從於五而上獨後之故凶凡爻以首言謂在上也无首者失在上之義也小畜乾下巽上小畜亨密雲不雨自我西郊從程氏彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚徃也自我西郊施未行也翼傳曰陽交乎隂而隂感之隂陽亨故能雨也今以隂而畜乎陽陽方以往為尚二者未和而亨雖宻雲而不雨未亨而言亨何也健進而巽受之剛而逹於五之中則其志行乃亨矣故曰健而巽剛中而志行乃亨亨則必雨故自五而逹於上則曰既雨既處也餘從程氏象曰風行天上小畜君子以懿文徳翼傳曰以柔畜陽豈以其未聚求有以勝之亦懿吾文徳而已懿美也文徳之美則威不用而羣陽可畜矣初九復自道何其咎吉象曰復自道其義吉也翼傳曰陽居於下非其所也受畜乎隂非其常也惟非其常所故三陽皆欲上復也雖然彼操其畜之之權以臨乎我我廹之以求其復則咎之所由生也初之復不廹四得位而又應之四之隂不拒乎初初之陽有助乎四是謂復自道何其咎吉夫私其所畜若有咎也惟其復自道故特以何其咎明之九二牽復吉象曰牽復在中亦不自失也翼傳曰陽在下而必進故以進為復初應乎四能復自道二无其應其復也難然二與初同體初能復二可牽聯而復也夫牽聯於人而後復若有咎也惟二所處在中進退必以其道故亦不自失也九三輿脫輻夫妻反目象曰夫妻反目不能正室也翼傳曰三之復進廹乎四四方得位力能止之故三輿脫輻而不能行陽不安於受畜而與之競故夫妻至於反目也夫上下同應於四而受其畜復以不能正室而咎夫陽何也陽畜隂常理也隂畜陽非常也以四之柔順固非大失道者然隂得以畜陽孰使之然哉臣之用事君必不能君也婦之用事夫必不能夫也旣不能夫矣不知所以善處者而進迫之則其失不得不責乎三也六四有孚血去惕出无咎象曰有孚惕出上合志也翼傳曰上下固受四之所畜然乾陽尚往四力止之不能无傷懼之患惟誠信以孚於上使在上者信任之則傷可去而惕可出故曰上合志也上言五也昔之人臣見天下之威權在已遂不知有其君不知己之權乃君之權一日不得乎君特一夫耳安能有所為哉四巽順之臣也苟非巽順則為權臣矣九五有孚攣如富以其鄰象曰有孚攣如不獨富也翼傳曰五雖君位亦四之所畜五能推誠心以信之使攣固而不可解以我之富為鄰之富則下之權乃我之權也富陽也不富隂也五雖陽而不獨富蓋以其富而厚乎四也太甲成王委心以聽於伊尹周公未嘗獨富也商周大治而太甲成王實享其成焉或謂五為小人所困故挽援在下者與之相濟義恐不然上九旣雨旣處尚徳載婦貞厲月幾望君子征凶象曰旣雨旣處徳積載也君子征凶有所疑也翼傳曰始之密雲不雨者陽在下而尚往隂畜之而未和故不雨也九五上九則異矣與四同巽體也同畜乾也五有孚以結乎四四之畜道行矣上處畜之終亦從畜而止四之畜道成矣既雨和也既處安也上下並畜而至於和且安者由四尚柔巽之徳而負載此任也雖然隂之畜陽非常理也婦貞固而乘其夫則危月將盈而幾於望則食君子至此不可復有所往也有所往則疑矣婦曰貞厲欲其不貞固而能變也月曰幾望若既望則不可戒矣此皆言四也於上而言四何也因畜道之成於終故於終爻而示戒所謂不可為典要也履兌下乾上履虎尾不咥人亨翼傳曰卦之所取者象也義也畫也所取雖不同而一隂一陽者義則全在畫也一隂在下為姤柔遇剛也在上為夬剛決柔也其義則甚明也在二曰同人上應於五其志同也在五曰大有履尊用柔諸陽服從所有者大也小畜與履二卦相對以變在四曰小畜臣比乎君故能畜陽然所畜者小故曰小畜在三曰履何也雜卦曰履不處也不處者不可久安其所也三何以不可久安其所也非得衆之位也何謂非得衆之位大有之五君位也同人之二應乎君也小畜之四比乎君也三皆不得乎此故繫辭曰三多凶言失中而不得乎五也不得乎君則无以得衆乃以一隂為衆剛之主上為剛所履而下履乎剛其危為履虎尾不可以乆處也履虎尾何以不咥人而亨也三兊體而上應乎乾也人能以兊說而承順乎乾是謂柔勝剛弱勝强理之至順也推是理也惟以禮自防者能之此履所以為禮也彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也翼傳曰五以剛中正履帝位而不為六三之所累是謂不疚不疚則其道光明矣象曰上天下澤履君子以辨上下定民志從程氏初九素履往无咎象曰素覆之往獨行願也翼傳曰陽剛居下无應于上其所履素潔故可履而往也素履既定其往也獨行其志願而已九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也翼傳曰二居三之下而為三所藉也夫人以好為人上之心而藉於我非自寛裕安恬以禮與之周旋則不安其處二以剛居中其所履者坦坦然平易此幽靜之人自守而不亂者以是處三是為貞且吉六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足與有行也咥人之凶位不當也武人為于大君志剛也翼傳曰三成卦之主也在卦則曰不咥人亨在爻則何以咥人凶也以成卦觀之下兊體也上乾體也兊說而應乎乾見其為不咥人也以一爻觀之三本柔也而位乎剛以柔居剛乃為羣陽之主所謂既不能强又不能弱如眇者之視不足有明跛者之履不足有行勢必至於見咥也以其主乎羣陽故曰為于大君也武人非剛明之徳謂其質柔志剛徒用其躁爾是豈可為大君哉九四履虎尾愬愬終吉象曰愬愬終吉志行也翼傳曰三為卦之主而四乘之五為夬決之君而四近之故亦為履虎尾然以剛居柔其剛不過雖履危而知懼者知懼則下可乘三上可輔五而其志得行矣九五夬履貞厲象曰夬履貞厲位正當也翼傳曰五君位也而衆之所歸乃歸於三理未有不正於一者五既剛果其勢必决三而去之夫居尊而失衆乃至於用決則已晚矣正當君位者蓋以是為厲也凡易言夬皆决去之義上九視履考祥其旋元吉象曰元吉在上大有慶也從程氏泰乾下坤上泰小往大來吉亨翼傳曰自乾坤十變而至於泰泰積累而後成也天地位而萬物生物之始生者必屯屯而經綸猶蒙昧也必有以發其蒙物之蒙者不可遽有為也需不遽也需而未得其欲爭心生焉於是有訟平其訟者必以師然後能比比聚也物聚則必畜猶曰小畜何也是以勢畜非以理畜也辨上下定民志必繼之以禮禮立則泰道始成矣自有天地以來積而至於堯舜之泰此理也自一代之興起積而至於成康之泰此理也漢至於比而畜矣而禮不足是以文景為小泰唐至於比而畜矣而禮不立是以太宗雖小泰一傳而遂亂其間迭為廢興之君非特不知禮也或師而未比或比而未畜偃然自以天下為已有不知廢壊亂亡已踵其後此秦魏晉宋齊梁之世望泰道而未之見也彖曰泰小徃大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也從程氏象曰天地交泰后以財成天地之道輔相天地之宜以左右民從程氏初九㧞茅茹以其彚征吉象曰㧞茅征吉志在外也翼傳曰茅之用可重㧞於下而薦於上故君子之類取象焉餘從程氏九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚於中行以光大也翼傳曰程氏釋此爻至為詳悉以其餘意推之非特處泰治之世當如是其處小人之道亦當如是蓋以君子在内二為之主所以制小人之命者在焉制小人之命者豈必蹙之於至窮之地哉曰包荒不以褊心而起其怨也曰用馮河不以疑心而來其間也曰不遐遺毋以在逺者為可忽也曰朋亡毋以在我者為可私也處泰如此則能以其中道而上配乎其君君為之主我行其志而其道光大矣餘從程氏九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也翼傳曰乾本居上坤本居下以交故為泰三乾陽之終也盛者至此而衰交者至此而變勿恤云者不必過於憂勞而不安於泰也其孚云者不可不誠其心而忽於泰也于食有福者享其安也餘從程氏六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也翼傳曰四為隂之首切近於内四先復則羣隂皆復不富言俱隂也俱隂則其志同志同則其勢易以合故不待戒約皆信從而復矣翩翩言復之疾也以舜之極治而難任人堲䜛說與夫去邪勿疑之言矻矻不離口蓋知小人之志常在於内也三以天理而示戒四以人事而示戒其保治之意至矣哉六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也翼傳曰五履尊位為泰之主不當以隂陽往復言故其辭異於三四其視二雖隂陽相反然以交際之義為重也餘從程氏上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也翼傳曰泰終則命亂否終則後喜否泰之往復必天理也人事果无與乎往復者有是理也所以使之然者人事也處泰之終坤體而隂柔泰安得而不亂處否之終乾體而剛陽否安得而不傾人事天理未有不相符者否坤下乾上否之匪人不利君子貞大往小來翼傳曰否之匪人以在内者皆非其人也餘從程氏彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也象曰天地不交否君子以儉徳辟難不可榮以禄從程氏初六㧞茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也翼傳曰聖人之心與天地同其大不欲一物失其所亦不欲一人為小人之歸故處小人之際化之而已未嘗遽絶之也遯之二隂方長於初則曰勿用有攸往否之三隂已盛於初則曰以其彚正吉初在下而未顯於在下未顯之時捨非從是其勢甚易若能與其類為守正之行而不與在上之隂並進吉且亨莫大焉其所以守正不往者非曰忘其君也将守吾正以有為也餘從程氏六二包承小人吉大人否亨象曰大人否亨不亂羣也翼傳曰以其居中得正遂設二義非敢遽以小人絶之也餘從程氏六三包羞象曰包羞位不當也從程氏九四有命无咎疇離祉象曰有命无咎志行也翼傳曰大象言君子不可榮以禄為不在位者設也九四居近君之位濟否之責在焉餘從程氏九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也翼傳曰當否之時必有扶衰撥亂之才然後能息天下之否五以陽剛而宅尊位為正當其休否之君乎休息也曰其亡其亡念其將亡也曰繫于苞桑言固其根本也桑之叢生根深而固繫之斯不失之矣國之根本其端不一如結民心如用仁賢如正心術誠能如此繫辭所謂危者安其位亡者保其存亂者有其治此少康宣王所以能興夏周也若本根一失則亂亡不可復救矣或謂六五之否已休不可忽其安且治當念否之復來恐非其㫖上九傾否先否後喜象曰否終則傾何可長也從程氏同人離下乾上同人于野亨利渉大川利君子貞翼傳曰同人大有對變之卦以一隂居下體之中曰同人以一隂居上體之中曰大有同人之彖爻多戒大有之彖爻多吉君臣之位異也夫子曰君子和而不同小人同而不和則同非善也泰卦曰上下交而其志同則同又為善也所謂同者其得失特未定顧其所同者如何爾人臣為羣隂之宗易失之私故同人之彖爻多戒人君為羣陽之宗上下順從故大有之彖爻多吉也餘從程氏彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志從程氏象曰天與火同人君子以類族辨物從程氏初九同人于門无咎象曰出門同人又誰咎也從程氏六二同人于宗吝象曰同人于宗吝道也從程氏九三伏戎于莽升其高陵三歳不興象曰伏戎于莽敵剛也三歲不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也翼傳曰小人險陂而多忌好勝而自私非特喜人之同乎已視君子之同道相比必有間而害之之心蓋不排其異己者則不能使人同乎已自古黨與之患皆起於此二五之同中且正也无他爻以分其應同而固也九三九四以不中正之姿處二人同心之間害其同者无所不至三伏戎于莽以伺五之隙升其高陵以窺二之動莽在下謂居五之下也陵在上謂居二之上也必三歳而不興二人同心之宻非三之所能勝不能勝則安能行也四比於五猶隔墉也始乘其墉而有欲攻之心卒弗克攻者二逺而不可致五尊而不可敵四居柔猶能困而自反也自反而不失其則是亦吉也餘從程氏九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也翼傳曰同人之五與比之五同也然比以一陽而比衆隂上下俱得其所比故曰邑人不誡吉同人所同者惟六二也在上者區區焉與其宗黨為同亦隘且吝矣此所以來三四之間至於先號咷而後笑大師克始相遇也周公之事武王霍光之事武帝君臣之志非不同也然不聞有䜛慝之言至成王昭帝則舉國而聽於周公霍光由是三監上官桀之徒始起而間之非兩君二臣同心之宻安能復相遇哉武王武帝以比道而任周霍成王昭帝以同人而任周霍也上九同人于郊无悔象曰同人于郊志未得也從程氏易翼傳上經上
