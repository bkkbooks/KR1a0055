front:
  text: 河南先生序易傳曰予所傳者辭也由辭以得意則在乎人焉此易翼傳之所以作也先君玩大易之理誦易傳之辭研精覃思凡數十年而後就如以廣其傳為請先君以為程子續道統於千載之後成書既久莫得傳授自謂精力未衰尚兾少進其後寢疾始以授尹焞張繹先覺猶不敢自足矧後學耶嵗在壬辰如持節閩嶠以藁本求是正於西山真公貳卿且請叙於篇首公雄文大册焜燿斯世不靳淵源之論為之發揮所得不既多乎已而謂如曰先君子没已久矣精力已畢見於此書矣詎可不使流布以示學者如拜手而謝曰謹受教是嵗仲夏朔旦男朝請大夫福建路轉運判官如岡刻於漕司之澄清堂後六十年陶孫勸學七閩訪澄清堂板已罹兵燬又十有六年陶孫由詞垣勸學江右年踰學易愚未聞道無所肖似缺焉私淑會廬陵學官來徴遺書謹取家蔵本授之能刻梓以與程楊二先生參亦斯文之一幸也惟曽大考歴事四朝紹熈得謝後屢召不起與誠齋同被襃異出處同則其著書亦同於翼經而已其於誠齋不能無異同者亦猶於伊川不能無異同也善讀者諒能因其同而觀其所以異因其異而究其所以同者焉西山先生不云乎其不同也乃所以相發也大徳丁未九日曾孫承事郎江西等處儒學提舉陶孫謹書於儒學公宇之存聖閣
